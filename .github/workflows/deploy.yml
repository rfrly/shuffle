name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout dev (for beta/)
        uses: actions/checkout@v4
        with:
          path: dev-checkout

      - name: Checkout main (for live app build)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-checkout

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: main-checkout/package-lock.json

      - name: Install and build live app from main
        working-directory: main-checkout
        run: npm install && npm run build

      - name: Assemble dist
        run: |
          cp -r main-checkout/dist dist
          cp dev-checkout/CNAME dist/CNAME
          cp -r main-checkout/me dist/me
          cp -r main-checkout/ross dist/ross
          cp -r main-checkout/s dist/s
          cp -r main-checkout/watch dist/watch
          cp -r dev-checkout/beta dist/beta

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

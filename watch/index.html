<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shuffle Watch" />
  <meta name="description" content="Randomise your exercises and keep time with Shuffle — a free tool that helps musicians practise more effectively." />
  <meta property="og:title" content="Shuffle Watch" />
  <meta property="og:description" content="Randomise your exercises and keep time with Shuffle — a free tool that helps musicians practise more effectively." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://shuffleclick.com" />
  <meta property="og:image" content="https://shuffleclick.com/shuffle-icon.png" />
  <title>Shuffle Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <link rel="icon" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --font-mono: 'Share Tech Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-body: 'Barlow', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body, html {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: var(--font-body);
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

.app {
  position: fixed;
  inset: 0;

  background: #0f0f0f;
  color: #e8e8e8;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-left: 1.5rem;
  padding-right: 1.5rem;
  padding-top: max(1rem, env(safe-area-inset-top));
  padding-bottom: 0.5rem;

  gap: 0.75rem;

  user-select: none;
  -webkit-user-select: none;
  overflow: clip;
}

    @media (hover: none) and (pointer: coarse) {
      .browser-mode .app {
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      }
    }

    @media (hover: none) and (pointer: coarse) and (max-width: 767px) {
      .browser-mode .app { gap: 0.4rem; }
      .browser-mode .controls { gap: 0.3rem; }
      .browser-mode .controls-grid { row-gap: 0.6rem; }
      .browser-mode .display { padding: 0.3rem 1rem; }
    }


    @media (max-height: 840px) and (max-width: 767px) {
      .app { gap: 0.4rem; padding-top: max(0.5rem, env(safe-area-inset-top)); }
      .app-header { margin-bottom: 0; }
      .display { padding: 0.6rem 1rem 0.5rem; }
      .section-grid { gap: 0.4rem 1.5rem; }
      .controls { gap: 0.4rem; }
      .btn-row { margin-top: 0.25rem; }
      .version-footer { margin-top: 0.1rem; }
    }

    @media (max-height: 750px) and (max-width: 767px) {
      .app { gap: 0.25rem; }
      .display { padding: 0.4rem 1rem; }
      .section-grid { gap: 0.3rem 1.5rem; }
      .controls { gap: 0.25rem; }
      .section-divider { margin: 0.1rem 0; }
    }


    .app-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 440px;
      margin-bottom: 0.1rem;
    }
    .app-header-row {
      display: flex;
      align-items: center;
      width: 100%;
    }
    .app-header-text { flex: 1; text-align: center; }
    .app-header-spacer { width: 32px; flex-shrink: 0; }

    .app-title {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f5c842;
      text-align: center;
    }

    .app-subtitle {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      text-align: center;
    }

    .display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 440px;
      flex: 1 1 0;
      min-height: 178px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1rem 1rem 0.75rem;
      position: relative;
    }

    .exercise-label {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      font-family: var(--font-mono);
      min-height: 1em;
      animation: label-fade-in 0.2s ease;
    }
    @keyframes label-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .exercise-label--set {
      color: #f5c842;
    }

    .exercise-number {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 8rem);
      line-height: 1;
      color: #f5c842;
      font-weight: 700;
      text-shadow: 0 0 30px rgba(245,200,66,0.3);
      transition: color 0.15s, text-shadow 0.15s, transform 0.15s;
      min-width: 3ch;
      text-align: center;
      transform: scale(1);
    }

    .exercise-number.flash {
      color: #ccc;
      text-shadow: 0 0 40px rgba(200,200,200,0.4);
      transform: scale(1.06);
    }

    .exercise-number.idle { color: #444; text-shadow: none; }
    .exercise-number.looping { color: #f5c842; text-shadow: 0 0 30px rgba(245,200,66,0.3); }
    .exercise-number.done {
      color: #4caf7d;
      text-shadow: 0 0 30px rgba(76,175,125,0.3);
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: 0.1em;
      text-transform: lowercase;
    }

    .next-exercise {
      font-family: var(--font-mono);
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #ccc;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .next-exercise .next-label {
      font-size: 0.6em;
      color: #888;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-right: 0.3em;
    }

    .status-label {
      font-size: 0.6em;
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: "Share Tech Mono", monospace;
    }
    .status-label--dim {
      color: #555;
    }

    .countdown-display {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 8rem);
      line-height: 1;
      color: #ff4500;
      text-shadow: 0 0 40px rgba(255,69,0,0.3);
      min-width: 3ch;
      text-align: center;
    }

    .idle-summary {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #777;
      text-align: center;
      padding: 0.4rem 0 0.2rem;
      min-height: 1.2em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .beat-dots {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 320px;
    }

    .beat-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #555;
      transition: background 0.05s;
    }
    .beat-dot.inactive { background: #555; }
    .beat-dot.active { background: #ff4500; }
    .beat-dot.beat1.active { background: #fff; }

    .bar-progress {
      display: flex;
      gap: 4px;
      margin-top: 0.3rem;
    }

    .bar-block {
      height: 5px;
      background: #555;
      border-radius: 2px;
      transition: background 0.1s;
    }
    .bar-block.done { background: #888; }
    .bar-block.current { background: #f5c842; }
    .bar-block.loop-current { background: #f5c842; opacity: 0.5; }
    .bar-block.countin-done { background: #7a2200; }
    .bar-block.countin-current { background: #ff4500; }

    .bar-progress-continuous {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.3rem;
    }

    .bar-progress-track {
      width: 192px;
      height: 5px;
      background: #555;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bar-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: #f5c842;
      transition: width 0.15s;
    }

    .bar-progress-fill.loop { opacity: 0.5; }

    .bar-progress-counter {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: #555;
      white-space: nowrap;
    }

    .bar-progress-counter.near-end { color: #f5c842; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
      max-width: 440px;
    }

    .section-divider {
      width: 100%;
      height: 1px;
      background: #1e1e1e;
      margin: 0.15rem 0;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem 1.5rem;
    }

    .controls-grid {
      grid-template-columns: repeat(3, 1fr);
      column-gap: 0.75rem;
      row-gap: 1rem;
    }

    @media (max-width: 767px) {
      .controls-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
      .controls-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 380px) {
      .sel-btn { font-size: 0.65rem; letter-spacing: 0.02em; }
    }

    .control-group { display: flex; flex-direction: column; gap: 0.3rem; min-width: 0; }
    .control-group.full-width { grid-column: 1 / -1; }

    .control-group label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      font-family: var(--font-mono);
    }

    .control-group.secondary label { color: #888; }
    .control-group.dimmed label { opacity: 0.5; }

    .compact-sel-btn {
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-family: var(--font-mono); font-size: 0.75rem;
      padding: 0 0.75rem; cursor: pointer; transition: all 0.1s;
      letter-spacing: 0.05em; height: 44px; border-radius: 4px;
      display: flex; align-items: center; white-space: nowrap;
      width: 100%; min-width: 0; justify-content: center;
    }
    .compact-sel-btn:active { background: #252525; }
    .compact-sel-btn.open { border-color: #f5c842; color: #f5c842; }
    .compact-sel-btn:disabled { opacity: 0.25; cursor: default; }
    .compact-popup {
      position: fixed; background: #1c1c1c; border: 1px solid #383838;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.6);
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      padding: 0.5rem; z-index: 50; border-radius: 4px;
    }
    .compact-popup-backdrop { position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.6); }

    .bpm-widget-row { display: flex; align-items: center; gap: 0.4rem; width: 100%; }
    .bpm-widget-row .bpm-widget { flex: 1; }
    .gear-visible .bpm-widget-row { gap: 2px; }
    .gear-visible .bpm-btn.right { border-radius: 0 4px 4px 0; }
    .bpm-timesig-row { display: flex; gap: 0.75rem; grid-column: 1 / -1; }
    .bpm-timesig-row .bpm-group { flex: 1; min-width: 0; }
    .bpm-timesig-row .timesig-group { flex: 1; min-width: 0; }
    .bpm-timesig-row.gear-visible .bpm-group { flex: 3; }
    .bpm-timesig-row.gear-visible .timesig-group { flex: 2; }

    @media (min-width: 768px) {
      .bpm-timesig-row { display: contents; }
      .bpm-timesig-row .bpm-group { min-width: 0; }
      .bpm-timesig-row .timesig-group { min-width: 0; }
    }

    .bpm-gear-btn {
      width: 36px; height: 44px; flex-shrink: 0;
      background: #1a1a1a; border: 1px solid #333; color: #777;
      font-size: 1.25rem; line-height: 1; cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .bpm-gear-btn:active { background: #2a2a2a; }
    .bpm-gear-btn.active { border-color: #f5c842; color: #f5c842; }

    .bpm-auto-backdrop { position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.6); }
    .bpm-auto-popup {
      position: fixed; z-index: 50;
      background: #1c1c1c; border: 1px solid #383838;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.6);
      border-radius: 6px; padding: 0.9rem 0.9rem;
      display: flex; flex-direction: column; gap: 0.8rem;
      min-width: 240px;
    }
    .bpm-auto-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: nowrap; }
    .bpm-auto-label { font-size: 0.65rem; color: #888; white-space: nowrap; min-width: 28px; }
    .bpm-auto-stepper { display: flex; align-items: center; height: 32px; }
    .bpm-auto-step-btn {
      width: 32px; height: 32px;
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.1s; flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .bpm-auto-step-btn:active { background: #2a2a2a; color: #fff; }
    .bpm-auto-step-btn.left { border-right: none; border-radius: 4px 0 0 4px; }
    .bpm-auto-step-btn.right { border-left: none; border-radius: 0 4px 4px 0; }
    .bpm-auto-step-val {
      min-width: 32px; height: 32px;
      background: #1a1a1a; border: 1px solid #333;
      border-left: none; border-right: none;
      color: #e8e8e8; font-family: var(--font-mono);
      font-size: 0.85rem; text-align: center;
      display: flex; align-items: center; justify-content: center;
    }
    .bpm-auto-unit-row { display: flex; gap: 0.3rem; }
    .bpm-auto-unit-row .sel-btn { height: 32px; font-size: 0.65rem; min-width: 40px; flex: 1; }
    .bpm-auto-master-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.2rem 0; cursor: pointer; user-select: none;
    }
    .bpm-auto-master-label {
      font-family: var(--font-mono); font-size: 0.8rem; color: #bbb;
    }
    .bpm-auto-toggle {
      width: 44px; height: 26px; border-radius: 13px;
      background: #333; border: 1px solid #444;
      position: relative; transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .bpm-auto-toggle.active { background: #f5c842; border-color: #f5c842; }
    .bpm-auto-toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #888; transition: transform 0.2s, background 0.2s;
    }
    .bpm-auto-toggle.active .bpm-auto-toggle-thumb {
      transform: translateX(18px); background: #1a1a1a;
    }
    .bpm-auto-inner { display: flex; flex-direction: column; gap: 0.6rem; }
    .bpm-auto-disabled { opacity: 0.35; pointer-events: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .bpm-auto-trigger-label {
      font-size: 0.6rem; color: #555; text-align: center; letter-spacing: 0.06em;
      padding: 0.1rem 0; margin-bottom: -0.4rem;
    }

    /* ── Vol popup subdiv rows ── */
    .vol-subdiv-inactive { opacity: 0.18; }
    .vol-subdiv-icon-btn {
      background: none; border: none; color: currentColor;
      padding: 0; cursor: pointer; display: flex; align-items: center;
      width: 32px; flex-shrink: 0;
    }
    .vol-subdiv-icon-btn .subdiv-svg { width: 24px; height: 18px; }
    .vol-subdiv-badge {
      display: inline-flex; align-items: center; margin-left: 3px; vertical-align: middle;
    }
    .vol-subdiv-badge .subdiv-svg { width: 16px; height: 12px; }

    .bpm-widget { display: flex; align-items: center; height: 44px; }

    .bpm-btn {
      width: 44px; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.1s, color 0.1s;
      flex-shrink: 0; font-family: var(--font-mono);
    }
    .bpm-btn:active { background: #2a2a2a; color: #fff; }
    .bpm-btn:disabled { opacity: 0.25; cursor: default; }
    .bpm-btn.left { border-right: none; border-radius: 4px 0 0 4px; }
    .bpm-btn.right { border-left: none; border-radius: 0 4px 4px 0; }

    .bpm-tap {
      flex: 1; height: 44px;
      background: #1a1a1a; border: 1px solid #333;
      color: #f5c842; font-family: var(--font-mono);
      font-size: 1rem; text-align: center; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.08s; min-width: 40px;
    }
    .bpm-tap:active { background: #252525; }
    .bpm-tap.tapped { background: #222; }
    .bpm-tap-label { font-size: 0.5rem; color: #555; letter-spacing: 0.08em; user-select: none; }
    .bpm-tap * { user-select: none; }

    .stepper { display: flex; align-items: center; height: 44px; }

    .stepper-btn {
      width: 44px; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.1s; flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .stepper-btn:active { background: #2a2a2a; color: #fff; }
    .stepper-btn:disabled { opacity: 0.25; cursor: default; }
    .stepper-btn.left { border-right: none; border-radius: 4px 0 0 4px; }
    .stepper-btn.right { border-left: none; border-radius: 0 4px 4px 0; }

    .stepper-val {
      flex: 1; height: 44px;
      background: #1a1a1a; border: 1px solid #333;
      border-left: none; border-right: none;
      color: #e8e8e8; font-family: var(--font-mono);
      font-size: 1rem; text-align: center;
      display: flex; align-items: center; justify-content: center;
      min-width: 40px;
    }

    .range-row { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .range-row input {
      flex: 1; min-width: 0; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #e8e8e8;
      font-family: var(--font-mono); font-size: 1rem;
      padding: 0.4rem 0.5rem; text-align: center; border-radius: 4px;
    }
    .range-row input:focus { outline: none; }
    .range-row input[readonly] { cursor: pointer; }
    .range-row input[readonly]:active { border-color: #f5c842; }
    .range-row input.invalid { border-color: #aa3333; }
    .pick-trigger-btn.invalid { border-color: #aa3333; }
    .range-row input:disabled { opacity: 0.25; cursor: default; }
    .range-row span { font-size: 0.7rem; color: #777; }

    .selector-row { display: flex; gap: 0.4rem; flex-wrap: nowrap; }

    .sel-btn {
      background: #1a1a1a; border: 1px solid #333; color: #bbb;
      font-family: var(--font-mono); font-size: 0.75rem;
      padding: 0 0.65rem; cursor: pointer; transition: all 0.1s;
      letter-spacing: 0.05em; height: 44px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex: 1;
    }
    .sel-btn:active { background: #252525; }
    .sel-btn.active { background: #1e1e1e; border-color: #ff4500; color: #ff4500; }
    .sel-btn:disabled { opacity: 0.25; cursor: default; }

    .subdiv-svg { display: block; overflow: visible; color: inherit; width: auto; height: 22px; }
    /* Subdivision compact selector popup — 2×2 grid of SVG options */
    .compact-popup.subdiv-popup {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem;
    }
    .compact-popup.subdiv-popup .sel-btn {
      display: flex; align-items: center; justify-content: center;
      width: 56px; height: 48px; padding: 0;
    }


    .check-row { display: flex; align-items: center; gap: 0.5rem; }
    .check-row span {
      font-size: 0.75rem; color: #aaa;
      font-family: var(--font-mono);
    }
    .check-row.disabled { opacity: 0.25; }

    .countin-row {
      display: flex; flex-direction: column; gap: 0.3rem;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 6px; background: #333; border-radius: 3px; outline: none;
      padding: 8px 0;
    }

    function generateWatchCode() {

      let a = pick(), b = pick();
      while (b === a) b = pick();
      return a + "-" + b;
    }

    // ── Observer vol popup (portal-rendered, positioned above vol button) ────────
    function ObsVolPopup({ btnRef, obsVolume, obsSubdivision, obsSubdivVol, obsSubdivVol2, obsSubdivVol3, onSendCmd }) {
      const [style, setStyle] = React.useState({});
      React.useEffect(() => {
        if (btnRef.current) {
          const rect = btnRef.current.getBoundingClientRect();
          setStyle({ position: 'fixed', right: window.innerWidth - rect.right, bottom: window.innerHeight - rect.top + 6, zIndex: 51 });
        }
      }, []);
      const clamp = (v) => Math.min(1, Math.max(0, Math.round(v * 100) / 100));
      const nudge = (field, cur, delta) => onSendCmd({ [field]: clamp((cur ?? 0.7) + delta) });
      // Subdivision rows: value=2 (8ths/♪♪), value=4 (16ths/♬), value=3 (triplets/⋮)
      const subRows = [
        { value: 2, field: "subdivVol",  vol: obsSubdivVol  ?? 0.7 },
        { value: 4, field: "subdivVol2", vol: obsSubdivVol2 ?? 0.7 },
        { value: 3, field: "subdivVol3", vol: obsSubdivVol3 ?? 0.7 },
      ];
      return (
        <div className="vol-slider-row" style={style}>
          <div className="vol-slider-item">
            <span>Master</span>
            <button className="vol-nudge-btn" onClick={() => nudge("volume", obsVolume, -0.05)}>−</button>
            <input type="range" min={0} max={1} step={0.05} value={obsVolume ?? 1} onChange={e => onSendCmd({ volume: Number(e.target.value) })} />
            <button className="vol-nudge-btn" onClick={() => nudge("volume", obsVolume, 0.05)}>+</button>
          </div>
          {subRows.map(row => {
            const active = obsSubdivision === row.value || (row.value === 2 && obsSubdivision === 4);
            const isSelector = !(row.value === 2 && obsSubdivision === 4);
            return (
              <div key={row.value} className={`vol-slider-item${active ? "" : " vol-subdiv-inactive"}`}>
                <button className="vol-subdiv-icon-btn"
                  onClick={() => { if (isSelector) onSendCmd({ subdivision: obsSubdivision === row.value ? 1 : row.value }); }}
                  style={!isSelector ? { cursor: "default" } : {}}>
                  <SubdivSVG value={row.value} />
                </button>
                <button className="vol-nudge-btn" onClick={() => nudge(row.field, row.vol, -0.05)}>−</button>
                <input type="range" min={0} max={1} step={0.05} value={row.vol} onChange={e => onSendCmd({ [row.field]: Number(e.target.value) })} />
                <button className="vol-nudge-btn" onClick={() => nudge(row.field, row.vol, 0.05)}>+</button>
              </div>
            );
          })}
        </div>
      );
    }

    // ── Observer display component ─────────────────────────────────────────────
    function ObserverDisplay({ state, code, onDisconnect, onSendCmd }) {
      const {
        running: obsRunning, paused: obsPaused, resuming: obsResuming, phase, setComplete: sc,
        currentBeat, currentBar, exercise, nextEx, countInBeat,
        mode: obsMode, sets: obsSets, displayMode: obsDisplayMode, elapsedSeconds: obsElapsed, bpm: obsBpm, timeSig: obsTimeSigLabel,
        barsPerExercise: obsBpe, exerciseLength: obsExLen,
        countInBars: obsCib, countInEvery: obsCountInEvery,
        looping: obsLooping, letterMode: obsLm,
        minEx: obsMinEx, maxEx: obsMaxEx,
        pickedNums: obsPickedNums, exMode: obsExMode,
        subdivision: obsSubdivision, beatStates: obsBeatStates, subdivVol: obsSubdivVol, subdivVol2: obsSubdivVol2, subdivVol3: obsSubdivVol3,
        volume: obsVolume, metSound: obsMetSound,
        bpmAuto: obsBpmAuto, bpmAutoStep: obsBpmAutoStep, bpmAutoDir: obsBpmAutoDir,
        bpmAutoTrigger: obsBpmAutoTrigger, bpmAutoBarInterval: obsBpmAutoBarInterval,
        bpmAutoSecInterval: obsBpmAutoSecInterval, bpmAutoRandom: obsBpmAutoRandom,
        isFirstExOfSet: obsIsFirstExOfSet, setCount: obsSetCount,
        disconnected,
      } = state || {};

      const [openSelector, setOpenSelector] = React.useState(null);
      const [pickerOpen, setPickerOpen] = React.useState(false);
      const [numpadOpen, setNumpadOpen] = React.useState(null);
      const tapTimesObs = React.useRef([]);
      const [tapped, setTapped] = React.useState(false);
      const [letterModeOverride, setLetterModeOverride] = React.useState(null);
      const effectiveLm = letterModeOverride !== null ? letterModeOverride : !!obsLm;
      const [toastMsg, setToastMsg] = React.useState(null);
      const [toastKey, setToastKey] = React.useState(0);
      const toastTimer = React.useRef(null);
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [soundMenuOpen, setSoundMenuOpen] = React.useState(false);
      const [showObsVolume, setShowObsVolume] = React.useState(false);
      const obsVolBtnRef = React.useRef(null);
      const showToast = (msg) => {
        setToastMsg(msg);
        setToastKey(k => k + 1);
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToastMsg(null), 1800);
      };

      const obsBpmRef = React.useRef(obsBpm);
      React.useEffect(() => { obsBpmRef.current = obsBpm; }, [obsBpm]);
      const incObsBpm = React.useCallback(() => {
        if (disabled) return;
        onSendCmd({ bpm: Math.min(300, (obsBpmRef.current || 80) + 1) });
      }, [disabled, onSendCmd]);
      const decObsBpm = React.useCallback(() => {
        if (disabled) return;
        onSendCmd({ bpm: Math.max(30, (obsBpmRef.current || 80) - 1) });
      }, [disabled, onSendCmd]);
      const bpmObsIncHandlers = useLongPress(incObsBpm);
      const bpmObsDecHandlers = useLongPress(decObsBpm);

      // BPM Automation local state (mirrors main app — teacher controls the student's BPM)
      const isObsMetronome = obsMode === "clickonly";
      const obsInfiniteEff = obsSets === '\u221e' || (typeof obsSets === 'number' && obsSets > 1);
      const [obsBpmAutoOpen,      setObsBpmAutoOpen]      = React.useState(false);
      const [localBpmAuto,        setLocalBpmAuto]        = React.useState(() => !!obsBpmAuto);
      const [localBpmAutoStep,    setLocalBpmAutoStep]    = React.useState(() => obsBpmAutoStep ?? 2);
      const [localBpmAutoDir,     setLocalBpmAutoDir]     = React.useState(() => obsBpmAutoDir ?? 'up');
      const [localBpmAutoTrigger, setLocalBpmAutoTrigger] = React.useState(() => obsBpmAutoTrigger ?? 'set');
      const [localBpmAutoBarInterval, setLocalBpmAutoBarInterval] = React.useState(() => obsBpmAutoBarInterval ?? 8);
      const [localBpmAutoSecInterval, setLocalBpmAutoSecInterval] = React.useState(() => obsBpmAutoSecInterval ?? 30);
      const [localBpmAutoRandom,  setLocalBpmAutoRandom]  = React.useState(() => !!obsBpmAutoRandom);
      const [localBpmAutoMin,     setLocalBpmAutoMin]     = React.useState(() => obsBpm || 80);
      const [localBpmAutoMax,     setLocalBpmAutoMax]     = React.useState(() => obsBpm || 80);
      const bpmGearBtnRef = React.useRef(null);

      // Sync local bpmAuto state when student state changes (e.g. on connect)
      React.useEffect(() => {
        setLocalBpmAuto(!!obsBpmAuto);
        setLocalBpmAutoStep(obsBpmAutoStep ?? 2);
        setLocalBpmAutoDir(obsBpmAutoDir ?? 'up');
        setLocalBpmAutoTrigger(obsBpmAutoTrigger ?? 'set');
        setLocalBpmAutoBarInterval(obsBpmAutoBarInterval ?? 8);
        setLocalBpmAutoSecInterval(obsBpmAutoSecInterval ?? 30);
        setLocalBpmAutoRandom(!!obsBpmAutoRandom);
      }, [obsBpmAuto, obsBpmAutoStep, obsBpmAutoDir, obsBpmAutoTrigger, obsBpmAutoBarInterval, obsBpmAutoSecInterval, obsBpmAutoRandom]);

      const obsAutoBarCountRef = React.useRef(0);
      const obsAutoTimerRef = React.useRef(null);

      const applyObsBpmStep = React.useCallback(() => {
        if (localBpmAutoRandom && !isObsMetronome) {
          const lo = Math.min(localBpmAutoMin, localBpmAutoMax);
          const hi = Math.max(localBpmAutoMin, localBpmAutoMax);
          onSendCmd({ bpm: Math.floor(Math.random() * (hi - lo + 1)) + lo });
        } else {
          const delta = localBpmAutoDir === 'up' ? localBpmAutoStep : -localBpmAutoStep;
          const newBpm = Math.min(300, Math.max(30, (obsBpmRef.current || 80) + delta));
          onSendCmd({ bpm: newBpm });
        }
      }, [localBpmAutoRandom, isObsMetronome, localBpmAutoMin, localBpmAutoMax, localBpmAutoDir, localBpmAutoStep, onSendCmd]);

      // Metronome bar-count BPM automation (teacher side)
      React.useEffect(() => {
        if (!localBpmAuto || obsMode !== "clickonly" || phase !== "playing" || obsPaused) return;
        if (localBpmAutoTrigger !== "bars" && localBpmAutoTrigger !== "set") return;
        obsAutoBarCountRef.current += 1;
        if (obsAutoBarCountRef.current >= localBpmAutoBarInterval) {
          obsAutoBarCountRef.current = 0;
          applyObsBpmStep();
        }
      }, [exercise]);

      // Metronome time-based BPM automation (teacher side)
      React.useEffect(() => {
        if (!localBpmAuto || obsMode !== "clickonly" || phase !== "playing" || obsPaused || localBpmAutoTrigger !== "seconds") {
          clearInterval(obsAutoTimerRef.current); obsAutoTimerRef.current = null;
          return;
        }
        const intervalMs = Math.max(1, localBpmAutoSecInterval) * 1000;
        obsAutoTimerRef.current = setInterval(applyObsBpmStep, intervalMs);
        return () => { clearInterval(obsAutoTimerRef.current); obsAutoTimerRef.current = null; };
      }, [localBpmAuto, obsMode, phase, obsPaused, localBpmAutoTrigger, localBpmAutoSecInterval, applyObsBpmStep]);

      React.useEffect(() => { obsAutoBarCountRef.current = 0; }, [localBpmAutoTrigger]);

      const beatsPerBar = parseInt(obsTimeSigLabel) || 4;
      const exLen = obsExLen || 1;
      const bpe = obsBpe || 4;
      const currentRound = Math.floor((currentBar || 0) / exLen) + 1;
      const isCountIn = phase === "countin";
      const isPlaying = phase === "playing";
      const isIdle = !obsRunning && !obsPaused;
      const disabled = !!disconnected;
      const subdivision = obsSubdivision || 1;
      const beatStates = Array.isArray(obsBeatStates) ? obsBeatStates : Array.from({ length: beatsPerBar }, (_, i) => i === 0 ? 'accent' : 'normal');

      const cycleBeatStateObs = React.useCallback((i) => {
        if (disabled || obsMode !== "clickonly") return;
        const order = ['accent', 'normal', 'silent'];
        const next = [...beatStates];
        next[i] = order[(order.indexOf(beatStates[i]) + 1) % 3];
        onSendCmd({ beatStates: next });
      }, [disabled, obsMode, beatStates, onSendCmd]);
      const obsTimeSig = TIME_SIGS.find(t => t.label === obsTimeSigLabel) || TIME_SIGS[2];
      const exMode = obsExMode || "range";
      const pickedNums = obsPickedNums || [];
      const validRange = obsMode === "clickonly" ? true
        : exMode === "pick" ? pickedNums.length >= 1
        : (obsMinEx || 1) <= (obsMaxEx || 1);

      const modeLabel = ({ fullset: "Shuffle", sequential: "Sequence", clickonly: "Metronome" }[obsMode] || obsMode) + (obsSets && obsSets !== 1 && obsMode !== "clickonly" ? (obsSets === "\u221e" ? " \u221e" : " \u00d7" + obsSets) : "");

      const buildSettingsSummary = () => {
        let parts = [];
        if (obsMode !== "clickonly") {
          if (exMode === "pick") {
            if (pickedNums.length === 0) parts.push("no exercises");
            else parts.push(...pickedNums.map(n => effectiveLm ? numToLetter(n) : String(n)));
          } else {
            const lo = effectiveLm ? numToLetter(obsMinEx || 1) : String(obsMinEx || 1);
            const hi = effectiveLm ? numToLetter(obsMaxEx || 1) : String(obsMaxEx || 1);
            parts.push(`${lo}\u2013${hi}`);
          }
          const rds = obsBpe || 1;
          parts.push(`${rds} round${rds !== 1 ? "s" : ""}`);
        }
        const cib = obsCib || 1;
        parts.push(`${cib}-bar count in${obsCountInEvery && obsMode !== "clickonly" ? " every exercise" : ""}`);
        parts.push(modeLabel);
        return parts.join(", ");
      };

      const buildShareUrl = () => {
        const p = new URLSearchParams();
        if (obsBpm)           p.set("bpm",    String(obsBpm));
        if (obsTimeSigLabel)  p.set("sig",    obsTimeSigLabel);
        if (obsExLen)         p.set("exlen",  String(obsExLen));
        if (obsMinEx != null) p.set("min",    String(obsMinEx));
        if (obsMaxEx != null) p.set("max",    String(obsMaxEx));
        if (obsCib)           p.set("cib",    String(obsCib));
        if (obsCountInEvery)  p.set("cie",    "1");
        if (obsMode)          p.set("mode",   obsMode);
        if (obsSets != null && obsSets !== 1 && obsMode !== "clickonly") p.set("sets", obsSets === "\u221e" ? "inf" : String(obsSets));
        if (obsDisplayMode === "timer" && obsMode === "clickonly") p.set("dm", "timer");
        if (obsBpe)           p.set("rounds", String(obsBpe));
        if (obsExMode && obsExMode !== "range") p.set("exmode", obsExMode);
        if (obsExMode === "pick" && pickedNums.length > 0) p.set("picks", pickedNums.join(","));
        if (effectiveLm)      p.set("lm",     "1");
        return "https://shuffleclick.com/?" + p.toString();
      };

      const handleTapBpm = () => {
        if (disabled || obsRunning) return;
        const now = Date.now();
        tapTimesObs.current = [...tapTimesObs.current.filter(t => now - t < 3000), now];
        if (tapTimesObs.current.length >= 2) {
          const intervals = tapTimesObs.current.slice(1).map((t, i) => t - tapTimesObs.current[i]);
          const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
          const newBpm = Math.round(60000 / avg);
          if (newBpm >= 30 && newBpm <= 300) onSendCmd({ bpm: newBpm });
        }
        setTapped(true);
        setTimeout(() => setTapped(false), 100);
      };

      return (
        <div className="observer-app">
          <div className="watching-banner">
            <div className="watching-banner-right">
              <span className="watching-code-text">watching <span>{code}</span></span>
              <button className="watching-disconnect-btn" onClick={() => { onSendCmd({ tcmd: "end-session", tseq: Date.now() }); _db.ref("sessions/" + code).remove(); onDisconnect(); }}>End session</button>
            </div>
            <button className={`obs-menu-btn${menuOpen ? " open" : ""}`}
              onClick={() => setMenuOpen(v => !v)}>☰</button>
            {menuOpen && (
              <>
                <div style={{ position: "fixed", inset: 0, zIndex: 49 }}
                     onClick={() => setMenuOpen(false)} />
                <div className="obs-menu-panel">
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false); setSoundMenuOpen(false);
                    const next = !effectiveLm;
                    setLetterModeOverride(next);
                    onSendCmd({ letterMode: next });
                    showToast(next ? "Letter mode on" : "Letter mode off");
                  }}>{effectiveLm ? "Turn letter mode off" : "Turn letter mode on"}</button>
                  <div className="obs-menu-item obs-menu-item--expandable" onClick={() => setSoundMenuOpen(v => !v)}>
                    <span>Click sound</span>
                    <span className={`settings-menu-arrow${soundMenuOpen ? " settings-menu-arrow--open" : ""}`}>›</span>
                  </div>
                  {soundMenuOpen && (
                    <div className="settings-menu-submenu">
                      {[
                        { id: "digital1", label: "Blip" },
                        { id: "digital2", label: "Ping" },
                        { id: "tick",     label: "Tick" },
                      ].map(({ id, label }) => (
                        <button key={id}
                          className={`settings-menu-submenu-item${(obsMetSound ?? "digital1") === id ? " settings-menu-submenu-item--active" : ""}`}
                          onClick={() => { onSendCmd({ metSound: id }); setMenuOpen(false); setSoundMenuOpen(false); }}>
                          <span className="settings-menu-submenu-dot">{(obsMetSound ?? "digital1") === id ? "\u25cf" : ""}</span>
                          {label}
                        </button>
                      ))}
                    </div>
                  )}
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false);
                    const summaryParts = [];
                    if (obsMode !== "clickonly") {
                      if (exMode === "pick" && pickedNums.length > 0) {
                        if (pickedNums.length > 4) summaryParts.push(`${pickedNums.length} exercises`);
                        else summaryParts.push(pickedNums.map(n => effectiveLm ? numToLetter(n) : String(n)).join(", "));
                      } else {
                        const lo = effectiveLm ? numToLetter(obsMinEx || 1) : String(obsMinEx || 1);
                        const hi = effectiveLm ? numToLetter(obsMaxEx || 1) : String(obsMaxEx || 1);
                        summaryParts.push(`${lo}\u2013${hi}`);
                      }
                    }
                    summaryParts.push(`${obsBpm || 80} BPM`);
                    if (obsTimeSigLabel && obsTimeSigLabel !== "4/4") summaryParts.push(obsTimeSigLabel);
                    if (obsMode !== "clickonly") {
                      summaryParts.push(`${obsBpe || 4} round${(obsBpe || 4) !== 1 ? "s" : ""}`);
                      if (obsCountInEvery) summaryParts.push("count in every exercise");
                    }
                    const modeWord = obsMode === "fullset" ? "Shuffle mode" : obsMode === "sequential" ? "Sequence mode" : "Metronome mode";
                    const setsSuf = obsMode !== "clickonly" ? (obsSets === "\u221e" ? " \u221e" : obsSets !== 1 ? ` \u00d7${obsSets}` : "") : "";
                    summaryParts.push(`${modeWord}${setsSuf}`);
                    const url = buildShareUrl();
                    navigator.clipboard.writeText(`${summaryParts.join(", ")}\n${url}`)
                      .then(() => showToast("Copied to clipboard!"))
                      .catch(() => showToast("Copy failed"));
                  }}>Share settings</button>
                  <button className="obs-menu-item obs-menu-item--destructive" onClick={() => {
                    setMenuOpen(false);
                    onSendCmd({ tcmd: "stop", tseq: Date.now(),
                      bpm: 80, timeSig: "4/4", barsPerExercise: 4, exerciseLength: 1,
                      minEx: 1, maxEx: 4, countInBars: 1, countInEvery: true,
                      mode: "fullset", sets: 1, displayMode: "bars", resetAll: true, exMode: "range", pickedNums: [], letterMode: false,
                      volume: 1.0, subdivision: 1, subdivVol: 0.7, subdivVol2: 0.7, subdivVol3: 0.7 });
                    setLetterModeOverride(false);
                    showToast("Settings reset");
                  }}>Reset to defaults</button>
                </div>
              </>
            )}
          </div>

          {disconnected && <div className="observer-offline">Session ended</div>}

          <div className={`display${obsMode === "clickonly" ? " display--metro" : ""}`}>
            <div key={`${phase}-${obsIsFirstExOfSet}-${obsSetCount}`} className={`exercise-label${obsIsFirstExOfSet && isPlaying && obsMode !== "clickonly" ? " exercise-label--set" : ""}`}>
              {isCountIn ? "count in" : sc ? "\u00A0" : isIdle ? "ready" : obsMode === "clickonly" ? (obsDisplayMode === "timer" ? "time" : "bar") : obsIsFirstExOfSet && isPlaying ? `set ${obsSetCount}` : "exercise"}
            </div>

            {isCountIn ? (
              <div className="countdown-display">
                {countInBeat > 0 ? (((countInBeat - 1) % beatsPerBar) + 1 < 10 ? "0" : "") + (((countInBeat - 1) % beatsPerBar) + 1) : "--"}
              </div>
            ) : sc ? (
              <div className="exercise-number done">done</div>
            ) : (
              <div className={`exercise-number${isIdle ? " idle" : ""}`}>
                {obsMode === "clickonly" && obsDisplayMode === "timer" && phase !== "idle"
                  ? `${Math.floor((obsElapsed || 0) / 60)}:${String((obsElapsed || 0) % 60).padStart(2, "0")}`
                  : exercise != null ? (effectiveLm ? String.fromCharCode(64 + exercise) : (exercise < 10 ? "0" + exercise : "" + exercise)) : "--"}
              </div>
            )}

            {!sc && (
              isIdle ? (
                sc ? <div className="idle-summary">&nbsp;</div>
                : obsMode === "clickonly" ? null : (
                  <div className="idle-summary" style={{ userSelect: "none", WebkitUserSelect: "none" }}>
                    {exMode === "pick"
                      ? `${pickedNums.length === 0 ? "no bars" : pickedNums.length > 4 ? `${pickedNums.length} exercises` : pickedNums.map(n => effectiveLm ? numToLetter(n) : String(n)).join(", ")} · ${obsBpe || "--"} round${obsBpe !== 1 ? "s" : ""} · ${(obsMode === "fullset" ? "shuffle" : obsMode === "sequential" ? "sequence" : obsMode || "--") + (obsSets && obsSets !== 1 && obsMode !== "clickonly" ? (obsSets === "\u221e" ? " \u221e" : " \u00d7" + obsSets) : "")}`
                      : `${effectiveLm ? numToLetter(obsMinEx || 1) : String(obsMinEx || 1)}–${effectiveLm ? numToLetter(obsMaxEx || 1) : String(obsMaxEx || 1)} · ${obsExLen || "--"}-bar ex · ${obsBpe || "--"} round${obsBpe !== 1 ? "s" : ""} · ${(obsMode === "fullset" ? "shuffle" : obsMode === "sequential" ? "sequence" : obsMode || "--") + (obsSets && obsSets !== 1 && obsMode !== "clickonly" ? (obsSets === "\u221e" ? " \u221e" : " \u00d7" + obsSets) : "")}`}
                  </div>
                )
              ) : (
                <div className="next-exercise">
                  {obsPaused
                    ? <span className="status-label">paused</span>
                    : obsResuming
                      ? obsMode === "clickonly"
                        ? <span className="status-label">resuming</span>
                        : <><span className="next-label">resuming</span>{exercise != null ? (effectiveLm ? String.fromCharCode(64 + exercise) : (exercise < 10 ? "0" + exercise : "" + exercise)) : "--"}</>
                      : obsLooping
                        ? <span className="status-label status-label--dim">looping</span>
                        : nextEx === -1 && phase === "playing"
                          ? <span className="status-label status-label--dim">last exercise</span>
                          : nextEx != null && (phase === "playing" || phase === "countin")
                            ? <><span className="next-label">up next</span>{effectiveLm ? String.fromCharCode(64 + (nextEx === -1 ? exercise : nextEx)) : ((nextEx === -1 ? exercise : nextEx) < 10 ? "0" + (nextEx === -1 ? exercise : nextEx) : "" + (nextEx === -1 ? exercise : nextEx))}</>
                            : "\u00A0"}
                </div>
              )
            )}

            {!sc && (
              <div className={`beat-dots${obsMode === "clickonly" ? " tappable" : ""}`}>
                {Array.from({ length: beatsPerBar }).map((_, i) => {
                  const bState = obsMode === "clickonly" ? (beatStates[i] ?? 'normal') : null;
                  const isActive = isPlaying && !obsPaused && (currentBeat || 0) === i;
                  return (
                    <div key={i}
                      className={[
                        'beat-dot',
                        isIdle && obsMode !== 'clickonly' ? 'inactive' : '',
                        i === 0 ? 'beat1' : '',
                        isActive ? 'active' : '',
                        bState ? bState : '',
                      ].filter(Boolean).join(' ')}
                      onClick={obsMode === "clickonly" ? () => cycleBeatStateObs(i) : undefined}
                    />
                  );
                })}
              </div>
            )}

            {!sc && obsMode === "clickonly" && subdivision > 1 && (
              <div className="subdiv-dots">
                {Array.from({ length: beatsPerBar * subdivision }).map((_, i) => {
                  const beatIndex = Math.floor(i / subdivision);
                  const subIndex = i % subdivision;
                  const isActive = isPlaying && !obsPaused && (currentBeat || 0) === beatIndex && subIndex === 0;
                  const isBeat = subIndex === 0;
                  return (
                    <div key={i} className={`subdiv-dot${isBeat ? ' beat' : ''}${isActive ? ' active' : ''}`} />
                  );
                })}
              </div>
            )}

            {!sc && obsMode !== "clickonly" && (
              <BarProgress
                barsPerExercise={bpe}
                currentRound={currentRound}
                currentBar={currentBar || 0}
                exerciseLength={exLen}
                looping={obsLooping}
                phase={phase || "idle"}
                countInBars={obsCib || 1}
                countInBeat={countInBeat || 0}
                beatsPerBar={beatsPerBar}
                barFlash={false}
              />
            )}
            {toastMsg && <div key={toastKey} className="obs-toast">{toastMsg}</div>}
          </div>


          <div className="observer-controls">
            <div className="section-grid controls-grid">

              <div className={`control-group full-width${obsRunning ? " dimmed" : ""}`}>
                <label>Mode</label>
                <div className="selector-row">
                  {[
                    { label: "Shuffle",   value: "fullset" },
                    { label: "Sequence",  value: "sequential" },
                    { label: "Metronome", value: "clickonly" },
                  ].map(m => (
                    <button key={m.value}

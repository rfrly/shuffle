    const TIME_SIGS = [
      { label: "2/4", beats: 2 },
      { label: "3/4", beats: 3 },
      { label: "4/4", beats: 4 },
      { label: "5/4", beats: 5 },
      { label: "6/4", beats: 6 },
      { label: "7/4", beats: 7 },
    ];

    const MODE_FULLSET    = "fullset";
    const MODE_SEQUENTIAL = "sequential";
    const MODE_CLICKONLY  = "clickonly";

    const STORAGE_KEY = "shuffle_settings_v7";

    // Lookahead scheduler timing: the scheduler fires every 25ms and pre-schedules
    // any beats falling within the next 200ms window. The 175ms gap between them is
    // the safety margin — audio events are committed well before they're needed, so
    // the audio thread never has to wait on the JS main thread.
    // Swift/AVAudioEngine port: replace ctx.currentTime with sampleTime / sampleRate,
    // and replace setInterval with a DispatchSourceTimer on a background queue.
    const SCHEDULER_INTERVAL_MS   = 25;
    const LOOKAHEAD_TIME          = 0.2;
    // Initial offset before the first beat — buys a scheduling buffer at start/resume
    // so the first beat is never missed even if JS startup takes a few milliseconds.
    const START_DELAY             = 0.1;
    const FLASH_DURATION_MS       = 200;
    const SET_COMPLETE_DISPLAY_MS = 2000;
    const RESUME_SETUP_DELAY_MS   = 50;
    const BPM_MIN                 = 30;
    const BPM_MAX                 = 300;
    const BARS_MIN                = 1;
    const BARS_MAX                = 32;
    const EX_MIN                  = 1;
    const EX_MAX                  = 200;
    const EX_MAX_LETTERS          = 26;
    const TAP_MAX_HISTORY         = 8;
    const TAP_RESET_MS            = 2000;
    const BAR_BLOCKS_MAX          = 16;  // above this threshold, use progress bar

    function loadSettings() {
      try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; }
      catch { return null; }
    }
    function saveSettings(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }
    function loadUrlParams() {
      try {
        const p = new URLSearchParams(window.location.search);
        if (!p.toString()) return null;
        const r = {};
        if (p.has("bpm"))    { const v = parseInt(p.get("bpm"));    if (v >= 30 && v <= 300) r.bpm = v; }
        if (p.has("sig"))    { const v = p.get("sig");               if (TIME_SIGS.some(t => t.label === v)) r.timeSig = v; }
        if (p.has("exlen"))  { const v = parseInt(p.get("exlen"));   if ([1,2,4].includes(v)) r.exerciseLength = v; }
        if (p.has("min"))    { const v = parseInt(p.get("min"));     if (v >= 1 && v <= 200) r.minEx = v; }
        if (p.has("max"))    { const v = parseInt(p.get("max"));     if (v >= 1 && v <= 200) r.maxEx = v; }
        if (p.has("cib"))    { const v = parseInt(p.get("cib"));     if ([1,2,4].includes(v)) r.countInBars = v; }
        if (p.has("cie"))    r.countInEvery = p.get("cie") === "1";
        if (p.has("mode"))   { const v = p.get("mode"); if (["fullset","sequential","clickonly"].includes(v)) r.mode = v; }
        if (p.has("sets"))   { const v = p.get("sets"); r.sets = v === "inf" ? '∞' : (parseInt(v) >= 1 ? parseInt(v) : 1); }
        if (p.has("dm"))     { const v = p.get("dm"); if (["bars","timer"].includes(v)) r.displayMode = v; }
        if (p.has("rounds")) { const v = parseInt(p.get("rounds"));  if (v >= 1 && v <= 32) r.barsPerExercise = v; }
        if (p.has("exmode")) { const v = p.get("exmode"); if (["range","pick"].includes(v)) r.exMode = v; }
        if (p.has("picks"))  { const nums = p.get("picks").split(",").map(Number).filter(n => n >= 1 && n <= 200); if (nums.length > 0) { r.pickedNums = nums; r.exMode = "pick"; } }
        if (p.has("lm"))     r.letterMode = p.get("lm") === "1";
        return Object.keys(r).length > 0 ? r : null;
      } catch { return null; }
    }

    function getCompressor(ctx) {
      if (ctx._compressor) return ctx._compressor;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -12;
      comp.knee.value       =   6;
      comp.ratio.value      =   4;
      comp.attack.value     = 0.003;
      comp.release.value    = 0.15;
      comp.connect(ctx.destination);
      ctx._compressor = comp;
      return comp;
    }

    function scheduleWoodblock(ctx, time, isDownbeat, vol, sound = 'digital1') {
      // When metronome sound is tick or clave (both noise-based), the count-in uses
      // a digital triangle oscillator instead of the woodblock — the contrast between
      // a pitched digital count-in and a noise click makes the phase transition clearer.
      // Swift port: generate an AVAudioPCMBuffer with the same noise + envelope math,
      // or use an AVAudioPlayerNode scheduled via scheduleBuffer(atTime:).
      if (sound === 'tick') {
        // Digital count-in for tick: triangle oscillator, octave-up on downbeat.
        // Pitched count-in contrasts clearly with the noise-based tick click.
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = isDownbeat ? 1760 : 880;
        osc.connect(gain); gain.connect(getCompressor(ctx));
        gain.gain.setValueAtTime((isDownbeat ? 0.9 : 0.55) * vol, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
        osc.start(time); osc.stop(time + 0.08);
        return;
      }
      // Default woodblock: pre-rendered via OfflineAudioContext with seeded PRNG,
      // same approach as the tick click — eliminates per-hit volume variance from
      // fresh random noise synthesis. Two variants: downbeat (2000 Hz) and normal (1400 Hz).
      // Gain envelope baked in; playback applies only the master vol scalar.
      const wbKey = '_woodblockBufs';
      if (!ctx[wbKey]) {
        function seededRand(seed) {
          return function() {
            seed |= 0; seed = seed + 0x6D2B79F5 | 0;
            let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
          };
        }
        function renderWoodblock(freq, gainVal, seed) {
          const rand    = seededRand(seed);
          const decay   = 0.05;
          const sr      = ctx.sampleRate;
          const bufSize = Math.floor(sr * decay);
          const offline = new OfflineAudioContext(1, bufSize, sr);
          const noiseBuf = offline.createBuffer(1, bufSize, sr);
          const data = noiseBuf.getChannelData(0);
          for (let i = 0; i < bufSize; i++)
            data[i] = (rand() * 2 - 1) * Math.pow(1 - i / bufSize, 10);
          const src = offline.createBufferSource();
          src.buffer = noiseBuf;
          const filter = offline.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.value = freq;
          filter.Q.value = 4;
          const gain = offline.createGain();
          gain.gain.setValueAtTime(gainVal, 0);
          gain.gain.exponentialRampToValueAtTime(0.001, decay);
          src.connect(filter); filter.connect(gain); gain.connect(offline.destination);
          src.start(0);
          return offline.startRendering();
        }
        ctx[wbKey] = Promise.all([
          renderWoodblock(2000, 2.8, 0xdeadbeef),  // downbeat
          renderWoodblock(1400, 2.0, 0xcafebabe),  // normal beat
        ]);
      }
      ctx[wbKey].then(([downbeatBuf, normalBuf]) => {
        const renderedBuf = isDownbeat ? downbeatBuf : normalBuf;
        const src = ctx.createBufferSource();
        src.buffer = renderedBuf;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, time);
        src.connect(gain); gain.connect(getCompressor(ctx));
        src.start(time);
      });
    }

    function scheduleEndBell(ctx, time, vol) {
      const bufSize = Math.floor(ctx.sampleRate * 0.06);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++)
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 8);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 2800;
      filter.Q.value = 5;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(vol * 1.4, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      src.connect(filter); filter.connect(gain); gain.connect(getCompressor(ctx));
      src.start(time); src.stop(time + 0.09);
    }

    function scheduleMetronomeClick(ctx, time, beatStateOrDownbeat, vol, isSubdivision, sound = 'digital1') {
      // beatStateOrDownbeat: "accent" | "normal" | "silent" | true (downbeat) | false (non-downbeat)
      // Legacy boolean usage (non-metronome-view paths): true = downbeat, false = normal
      // sound: 'digital1' | 'digital2' | 'tick'
      const beatState = typeof beatStateOrDownbeat === 'string'
        ? beatStateOrDownbeat
        : beatStateOrDownbeat ? 'accent' : 'normal';
      if (beatState === 'silent') return;

      if (sound === 'tick') {
        // Tick: pre-rendered noise buffers, generated once per AudioContext and cached.
        // Pre-rendering eliminates run-to-run volume variance — short filtered noise is
        // inherently random, so synthesising it fresh each click causes wild loudness
        // swings (±10 dB). Baking the filter into the buffer via OfflineAudioContext
        // makes every click identical. Gains are tuned to match Blip/Ping RMS.
        // Three variants: accent (2000 Hz bandpass), normal (1200 Hz), subdiv (900 Hz).
        const tickKey = '_tickBufs';
        if (!ctx[tickKey]) {
          // Render all three variants. OfflineAudioContext renders synchronously into
          // a buffer — the result is deterministic regardless of when it's called.
          const decay = 0.05;
          // Seeded PRNG (mulberry32) — same seed every run so the rendered buffer is
          // identical across page loads and devices, eliminating between-session variance.
          function seededRand(seed) {
            return function() {
              seed |= 0; seed = seed + 0x6D2B79F5 | 0;
              let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
              t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
              return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
          }
          function renderTick(freq, q, gainVal, seed) {
            const rand    = seededRand(seed);
            const sr      = ctx.sampleRate;
            const bufSize = Math.floor(sr * decay);
            const offline = new OfflineAudioContext(1, bufSize, sr);
            const noiseBuf = offline.createBuffer(1, bufSize, sr);
            const data = noiseBuf.getChannelData(0);
            for (let i = 0; i < bufSize; i++)
              data[i] = (rand() * 2 - 1) * Math.pow(1 - i / bufSize, 14);
            const src = offline.createBufferSource();
            src.buffer = noiseBuf;
            const filter = offline.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = freq;
            filter.Q.value = q;
            const gain = offline.createGain();
            gain.gain.setValueAtTime(gainVal, 0);
            gain.gain.exponentialRampToValueAtTime(0.001, decay);
            src.connect(filter); filter.connect(gain); gain.connect(offline.destination);
            src.start(0);
            // startRendering() returns a Promise, but we resolve it lazily on first use
            return offline.startRendering();
          }
          ctx[tickKey] = Promise.all([
            renderTick(2000, 5, 14.0, 0x1a2b3c4d),  // accent
            renderTick(1200, 5, 10.0, 0x5e6f7a8b),  // normal
            renderTick(900,  4,  6.0, 0x9cad0ebe),  // subdiv
          ]);
        }
        ctx[tickKey].then(([accentBuf, normalBuf, subdivBuf]) => {
          const renderedBuf = isSubdivision ? subdivBuf
                            : beatState === 'accent' ? accentBuf : normalBuf;
          const src = ctx.createBufferSource();
          src.buffer = renderedBuf;
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(vol, time);
          src.connect(gain); gain.connect(getCompressor(ctx));
          src.start(time);
        });
        return;
      }

      if (sound === 'digital2') {
        // Digital 2: triangle wave click at the same pitches as the count-in triangle
        // oscillator (880 Hz normal, 1760 Hz accent). This is the same sound the user
        // hears during the count-in when using digital1/digital2 — familiar, warm,
        // pitched. Subdivision uses 440 Hz (one octave below normal) for distinction.
        const osc = ctx.createOscillator();
        osc.type = 'triangle';
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(getCompressor(ctx));
        if (isSubdivision) {
          osc.frequency.value = 440;
          gain.gain.setValueAtTime(0.35 * vol, time);
        } else {
          osc.frequency.value = beatState === 'accent' ? 1760 : 880;
          gain.gain.setValueAtTime((beatState === 'accent' ? 0.9 : 0.55) * vol, time);
        }
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
        osc.start(time); osc.stop(time + 0.08);
        return;
      }

      // digital1: original sine click (unchanged)
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getCompressor(ctx));
      if (isSubdivision) {
        osc.frequency.value = 500;
        gain.gain.setValueAtTime(0.22 * vol, time);
      } else {
        osc.frequency.value = beatState === 'accent' ? 1000 : 700;
        gain.gain.setValueAtTime((beatState === 'accent' ? 0.9 : 0.5) * vol, time);
      }
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      osc.start(time); osc.stop(time + 0.09);
    }

    // Keeps the AudioContext alive and currentTime advancing continuously.
    // Browsers suspend an idle AudioContext after ~30s of silence, which resets or
    // pauses currentTime — causing timing jumps when the scheduler resumes.
    // A near-silent (0.001 gain) looping buffer prevents suspension without being
    // audible. Must be started once on fresh start and stopped on full stop.
    // Swift port: AVAudioEngine doesn't auto-suspend; this trick is not needed,
    // but the audio session category must be set to .playback for background audio.
    function startSilentLoop(ctx) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const gain = ctx.createGain();
      gain.gain.value = 0.001;
      src.connect(gain); gain.connect(getCompressor(ctx));
      src.start();
      return src;
    }

    function useLongPress(callback, { delay = 400, interval = 80 } = {}) {
      const timeoutRef   = useRef(null);
      const intervalRef  = useRef(null);

      const start = useCallback(() => {
        callback();
        timeoutRef.current = setTimeout(() => {
          intervalRef.current = setInterval(callback, interval);
        }, delay);
      }, [callback, delay, interval]);

      const stop = useCallback(() => {
        clearTimeout(timeoutRef.current);
        clearInterval(intervalRef.current);
      }, []);

      return {
        onMouseDown: start,
        onMouseUp: stop,
        onMouseLeave: stop,
        onTouchStart: (e) => { e.preventDefault(); start(); },
        onTouchEnd: (e) => { e.preventDefault(); stop(); },
        onTouchCancel: stop,
      };
    }

    function useSwipeInput({ onSwipeUp, onSwipeDown, onTap, disabled, threshold = 15 }) {
      const startYRef = useRef(null);
      return {
        onTouchStart: (e) => { if (disabled) return; e.preventDefault(); startYRef.current = e.touches[0].clientY; },
        onTouchEnd: (e) => {
          if (startYRef.current === null) return;
          const delta = startYRef.current - e.changedTouches[0].clientY;
          startYRef.current = null;
          if (Math.abs(delta) > threshold) { if (delta > 0) onSwipeUp(); else onSwipeDown(); } else { onTap(); }
        },
        onClick: () => { if (!disabled) onTap(); },
        style: { touchAction: 'none' },
      };
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // useDrumTimer — lookahead audio scheduler
    //
    // TIMING ARCHITECTURE
    // The scheduler runs on a 25ms setInterval and pre-schedules audio events up to
    // 200ms ahead using Web Audio's ctx.currentTime (a monotonic clock maintained by
    // the audio thread). This decouples the time-critical audio path from the JS main
    // thread: even if JS stalls for a frame, beats are already queued.
    //
    // Audio events are scheduled with ctx.currentTime precision.
    // UI state updates (setCurrentBeat, setCurrentBar, etc.) use setTimeout with a
    // delay of (scheduledTime - ctx.currentTime) * 1000 — they fire "as close as
    // possible" to the beat, but are never on the real-time audio path.
    //
    // PHASE FLOW
    //   countin → playing → [inter-exercise countin → playing] → ... → set complete
    //
    // BEAT COUNTERS (three separate, non-overlapping)
    //   beatCount       — position within the initial count-in (0 → countInBeats-1)
    //   playBeatCount   — position within the playing phase; drives exercise/bar maths
    //   countInBeatPos  — position within an inter-exercise count-in; playBeatCount is
    //                     paused (reset to 0) while this is active to avoid corrupting
    //                     the beat-to-exercise index calculation
    //
    // SWIFT / AVAUDIOSESSION PORTING NOTES
    //   • ctx.currentTime  →  Double(engine.outputNode.lastRenderTime!.sampleTime) / sampleRate
    //   • setInterval      →  DispatchSourceTimer on a background queue
    //   • setTimeout(fn,d) →  DispatchQueue.main.asyncAfter(deadline: .now() + d/1000)
    //   • stoppedRef guard →  capture a cancelled flag in the closure / use Task cancellation
    //   • AudioContext never suspends in AVAudioEngine — startSilentLoop is not needed;
    //     instead configure AVAudioSession category to .playback for background audio
    // ─────────────────────────────────────────────────────────────────────────────
    function useDrumTimer({ bpm, beatsPerBar, barsPerExercise, minEx, maxEx,
                            onNewExercise, onNextExercise, onSetComplete, onSetLoop,
                            running, paused, resuming,
                            countInBars, countInEveryRound,
                            mode, volume, looping, infinite, setComplete,
                            exMode, pickedNums, subdivision, beatStates, subdivVol, subdivVol2, subdivVol3,
                            metSound, keepCtxAlive }) {

      const audioCtx          = useRef(null);
      const silentLoop        = useRef(null);
      const nextBeatTime      = useRef(0);
      const beatCount         = useRef(0);
      const schedulerRef      = useRef(null);
      const lastExercise      = useRef(null);
      const nextExercise      = useRef(null);
      const deckRef           = useRef([]);
      const seqIndex          = useRef(0);
      const exercisesPlayed   = useRef(0);
      const playingBars       = useRef(0);
      const loopingRef        = useRef(looping);
      const infiniteRef       = useRef(infinite);
      const countInProgress   = useRef(false);
      const countInBeatPos    = useRef(0);
      const playBeatCount     = useRef(0);
      const schedulerFn       = useRef(null);
      const setEndPending     = useRef(false);
      const stoppedRef        = useRef(false);
      const wasRunningRef     = useRef(false);

      const [currentBeat,   setCurrentBeat]   = useState(0);
      const [currentBar,    setCurrentBar]    = useState(0);
      const [currentSubdiv, setCurrentSubdiv] = useState(0);
      const [phase,         setPhase]         = useState("idle");
      const [flashOn,       setFlashOn]       = useState(false);
      const [countInBeat,   setCountInBeat]   = useState(0);
      const [isResuming,    setIsResuming]    = useState(false);

      const getCtx = useCallback(() => {
        if (!audioCtx.current)
          audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx.current;
      }, []);

      const buildDeck = useCallback((min, max, avoidFirst) => {
        const arr = [];
        for (let i = min; i <= max; i++) arr.push(i);
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        if (avoidFirst != null && arr.length > 1 && arr[0] === avoidFirst) {
          const swap = Math.floor(Math.random() * (arr.length - 1)) + 1;
          [arr[0], arr[swap]] = [arr[swap], arr[0]];
        }
        return arr;
      }, []);

      const buildDeckFromArray = useCallback((arr, avoidFirst) => {
        const deck = [...arr];
        for (let i = deck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        if (avoidFirst != null && deck.length > 1 && deck[0] === avoidFirst) {
          const swap = Math.floor(Math.random() * (deck.length - 1)) + 1;
          [deck[0], deck[swap]] = [deck[swap], deck[0]];
        }
        return deck;
      }, []);

      const pickNext = useCallback((min, max, last, currentMode) => {
        const { exMode: em, pickedNums: pn } = stateRef.current;
        if (em === 'pick' && pn && pn.length > 0) {
          if (currentMode === MODE_FULLSET) {
            if (deckRef.current.length === 0) deckRef.current = buildDeckFromArray(pn, last);
            return deckRef.current.shift();
          } else {
            const ex = pn[seqIndex.current % pn.length];
            seqIndex.current++;
            return ex;
          }
        }
        if (currentMode === MODE_FULLSET) {
          if (deckRef.current.length === 0) deckRef.current = buildDeck(min, max, last);
          return deckRef.current.shift();
        } else {
          const total = max - min + 1;
          const ex = min + (seqIndex.current % total);
          seqIndex.current++;
          return ex;
        }
      }, [buildDeck, buildDeckFromArray]);

      const stateRef = useRef({});
      useEffect(() => {
        stateRef.current = { bpm, beatsPerBar, barsPerExercise, minEx, maxEx,
                             onNewExercise, onNextExercise, onSetComplete, onSetLoop,
                             countInBars, countInEveryRound,
                             mode, volume, exMode, pickedNums, subdivision, beatStates, subdivVol, subdivVol2, subdivVol3,
                             metSound };
      });

      const resumingRef = useRef(false);

      useEffect(() => {
        infiniteRef.current = infinite;
      }, [infinite]);

      useEffect(() => {
        loopingRef.current = looping;
        if (!looping && lastExercise.current !== null) {
          const { onNextExercise: onNext } = stateRef.current;
          if (setEndPending.current) {
            onNext(-1);
          } else if (nextExercise.current !== null) {
            onNext(nextExercise.current);
          }
        }
      }, [looping]);

      useEffect(() => {
        if (!audioCtx.current) return;
        const ctx = audioCtx.current;
        if (paused) {
          clearInterval(schedulerRef.current);
        } else if (resuming) {
          resumingRef.current = true;
          beatCount.current = 0;
          playBeatCount.current = 0;
          countInProgress.current = false;
          countInBeatPos.current = 0;
          nextBeatTime.current = Infinity;
          // Resync playingBars to where we are in the current set so that ∞ set-loop
          // and "last exercise" signals fire correctly after resume.
          // exercisesPlayed is the 1-based count of exercises played so far; subtracting
          // 1 and taking modulo gives position-in-set (0-based), then multiply by bpe to
          // get the bar count the ∞ detection expects.
          {
            const { barsPerExercise: bpe, minEx: mn, maxEx: mx, exMode: em, pickedNums: pn } = stateRef.current;
            const totalInSet = (em === 'pick' && pn && pn.length > 0) ? pn.length : mx - mn + 1;
            const posInSet = (exercisesPlayed.current - 1) % totalInSet;
            playingBars.current = posInSet * bpe;
          }
          setIsResuming(true);
          setPhase("countin");
          const { onNextExercise: onNext } = stateRef.current;
          onNext(lastExercise.current);
          // RESUME_SETUP_DELAY_MS (50ms): AudioContext.resume() is async and the context
          // state may still read "suspended" for a few milliseconds after the call.
          // Delaying the scheduler restart gives it time to settle so nextBeatTime is
          // set against a fully-running clock.
          setTimeout(() => {
            nextBeatTime.current = ctx.currentTime + START_DELAY;
            clearInterval(schedulerRef.current);
            if (schedulerFn.current) {
              schedulerRef.current = setInterval(schedulerFn.current, SCHEDULER_INTERVAL_MS);
            }
          }, RESUME_SETUP_DELAY_MS);
        } else {
          ctx.resume().catch(() => {});
        }
      }, [paused, resuming]);

      // ── Reset on stop ──
      useEffect(() => {
        if (!running) {
          if (wasRunningRef.current) stoppedRef.current = true;
          clearInterval(schedulerRef.current);
          if (silentLoop.current) { try { silentLoop.current.stop(); } catch {} silentLoop.current = null; }
          if (!keepCtxAlive) {
            if (setComplete) {
              setTimeout(() => {
                if (audioCtx.current) { try { audioCtx.current.close(); } catch {} audioCtx.current = null; }
              }, 150);
            } else {
              if (audioCtx.current) { try { audioCtx.current.close(); } catch {} audioCtx.current = null; }
            }
          }
          setPhase("idle");
          setCurrentBeat(0); setCurrentBar(0); setCountInBeat(0); setIsResuming(false);
          beatCount.current = 0; playBeatCount.current = 0; exercisesPlayed.current = 0; playingBars.current = 0;
          lastExercise.current = null; nextExercise.current = null;
          deckRef.current = []; seqIndex.current = 0;
          countInProgress.current = false; countInBeatPos.current = 0;
          resumingRef.current = false; schedulerFn.current = null; setEndPending.current = false;
          nextBeatTime.current = 0;
          wasRunningRef.current = false;
        }
      }, [running, setComplete]);

      // ── Fresh start only ──
      useEffect(() => {
        if (!running || paused || resuming || schedulerFn.current) return;

        const ctx = getCtx();
        if (ctx.state === "suspended") ctx.resume();
        if (!silentLoop.current) silentLoop.current = startSilentLoop(ctx);

        const { countInBars: cib, minEx: mn, maxEx: mx,
                onNewExercise: cb, onNextExercise: cbNext, mode: m } = stateRef.current;

        beatCount.current = 0; playBeatCount.current = 0;
        // START_DELAY (100ms) gives the scheduler a head start — the first beat is
        // pre-scheduled before the interval even fires for the first time.
        nextBeatTime.current = ctx.currentTime + START_DELAY;
        countInProgress.current = false; countInBeatPos.current = 0;
        resumingRef.current = false; stoppedRef.current = false;
        wasRunningRef.current = true;

        exercisesPlayed.current = 1;
        deckRef.current = []; seqIndex.current = 0;
        setPhase("countin");

        if (m === MODE_CLICKONLY) {
          lastExercise.current = 1;
          nextExercise.current = null;
          cb(1);
          cbNext(null);
        } else {
          const firstEx = pickNext(mn, mx, null, m);
          lastExercise.current = firstEx;

          const { exMode: emStart, pickedNums: pnStart } = stateRef.current;
          const totalInSetAtStart = (emStart === 'pick' && pnStart && pnStart.length > 0) ? pnStart.length : mx - mn + 1;
          if ((m === MODE_FULLSET || m === MODE_SEQUENTIAL) && totalInSetAtStart === 1) {
            nextExercise.current = firstEx;
            setEndPending.current = true;
            cbNext(firstEx);
          } else {
            const secondEx = pickNext(mn, mx, firstEx, m);
            nextExercise.current = secondEx;
            cbNext(firstEx);
          }
        }

        const scheduler = () => {
          const { bpm: b, beatsPerBar: bpb2, barsPerExercise: bpe,
                  minEx: min, maxEx: max,
                  onNewExercise: onChange, onNextExercise: onNext,
                  onSetComplete: onDone, onSetLoop: onLoop,
                  countInBars: cib2, countInEveryRound: cier,
                  mode: currentMode, volume: vol, metSound: mSound } = stateRef.current;

          const beatLen           = 60 / b;
          const countInBeats      = bpb2 * cib2;
          const interCountInBeats = cier ? bpb2 * cib2 : 0;
          const { exMode: em, pickedNums: pn } = stateRef.current;
          const totalInSet        = (em === 'pick' && pn && pn.length > 0) ? pn.length : max - min + 1;

          // Core lookahead loop: on each 25ms tick, schedule every beat that falls
          // within the next 200ms. Usually this is 0–2 beats; at very high BPMs it
          // may be more. nextBeatTime advances by one beatLen each iteration and the
          // loop exits as soon as the next beat is outside the window.
          while (nextBeatTime.current < ctx.currentTime + LOOKAHEAD_TIME) {
            const bc = beatCount.current;

            // ── Phase 1: initial count-in (beatCount 0 → countInBeats-1) ──
            if (bc < countInBeats) {
              const beatInCI = bc % bpb2;
              scheduleWoodblock(ctx, nextBeatTime.current, beatInCI === 0, vol, mSound);
              const t = nextBeatTime.current;
              // stoppedRef guard: the user may hit Stop between scheduling this beat
              // and the setTimeout firing. Without the guard, stale state updates would
              // execute after the scheduler resets, corrupting the next run's initial state.
              setTimeout(() => { if (stoppedRef.current) return; setCountInBeat(bc + 1); setPhase("countin"); },
                Math.max(0, (t - ctx.currentTime) * 1000));
              if (bc === countInBeats - 1) {
                const cur = lastExercise.current;
                const nxt = setEndPending.current ? -1 : nextExercise.current;
                setTimeout(() => {
                  if (stoppedRef.current) return;
                  onChange(cur);
                  onNext(nxt);
                  setPhase("playing");
                  setIsResuming(false);
                  resumingRef.current = false;
                }, Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
              }

            } else {
              // ── Phase 2: playing (and inter-exercise count-ins) ──
              const inInterCountIn = countInProgress.current;

              // Inter-exercise count-in: playBeatCount is paused (reset to 0) while this
              // runs so it doesn't advance through the exercise/bar index maths. Only
              // countInBeatPos increments here, then countInProgress is cleared and the
              // playing phase resumes from playBeatCount = 0 (the new exercise's beat 1).
              if (inInterCountIn) {
                const interPos = countInBeatPos.current;
                scheduleWoodblock(ctx, nextBeatTime.current, interPos % bpb2 === 0, vol, mSound);
                const t = nextBeatTime.current;
                setTimeout(() => { if (stoppedRef.current) return; setCountInBeat(interPos + 1); setPhase("countin"); },
                  Math.max(0, (t - ctx.currentTime) * 1000));
                countInBeatPos.current++;
                if (countInBeatPos.current >= interCountInBeats) {
                  countInProgress.current = false; countInBeatPos.current = 0;
                  const upcoming = nextExercise.current;
                  const t2 = nextBeatTime.current;
                  setTimeout(() => { if (stoppedRef.current) return; onNext(upcoming); setPhase("playing"); },
                    Math.max(0, (t2 - ctx.currentTime) * 1000 + beatLen * 1000));
                }

              } else {
                const playBeat      = playBeatCount.current;
                const beatInBar     = playBeat % bpb2;
                const barInExercise = Math.floor(playBeat / bpb2) % bpe;
                const isNewExercise = playBeat > 0 && beatInBar === 0 && barInExercise === 0;
                const isDownbeat    = beatInBar === 0;

                if (!(isNewExercise && setEndPending.current && !loopingRef.current)) {
                  const { subdivision: subdiv, beatStates: bStates, mode: clickMode, subdivVol: sVol = 1, subdivVol2: sVol2 = 1, subdivVol3: sVol3 = 1 } = stateRef.current;
                  const beatState = (clickMode === MODE_CLICKONLY && bStates && bStates[beatInBar] != null)
                    ? bStates[beatInBar]
                    : (isDownbeat ? 'accent' : 'normal');
                  scheduleMetronomeClick(ctx, nextBeatTime.current, beatState, vol, false, mSound);
                  if (subdiv > 1) {
                    const subdivLen = (60 / b) / subdiv;
                    for (let s = 1; s < subdiv; s++) {
                      // subdiv=3 (triplets): use sVol3. subdiv=4 (16ths): s=2 is 8th position (sVol), s=1,3 are pure 16ths (sVol2). subdiv=2 (8ths): sVol.
                      const subMul = subdiv === 3 ? sVol3 : (subdiv === 4 && s % 2 !== 0) ? sVol2 : sVol;
                      scheduleMetronomeClick(ctx, nextBeatTime.current + subdivLen * s, 'normal', vol * subMul, true, mSound);
                      const tSub = nextBeatTime.current + subdivLen * s;
                      setTimeout(() => {
                        if (stoppedRef.current) return;
                        setCurrentSubdiv(s);
                      }, Math.max(0, (tSub - ctx.currentTime) * 1000));
                    }
                  }
                }
                const t = nextBeatTime.current;
                setTimeout(() => {
                  if (stoppedRef.current) return;
                  setCurrentBeat(beatInBar);
                  setCurrentSubdiv(0);
                  setCurrentBar(barInExercise);
                  if (currentMode !== MODE_CLICKONLY && isDownbeat && barInExercise === 0 && playBeat > 0) {
                    setFlashOn(true);
                    setTimeout(() => setFlashOn(false), FLASH_DURATION_MS);
                  }
                }, Math.max(0, (t - ctx.currentTime) * 1000));

                // ∞ set-loop detection: increment playingBars on every downbeat (except
                // the very first, playBeat > 0 guard) and fire onLoop when the bar count
                // is an exact multiple of totalBarsPerSet (all exercises × barsPerExercise).
                // The "last exercise" signal fires one full exercise early (totalBarsPerSet - bpe)
                // so the UI has time to update the "next exercise" label before it arrives.
                if (currentMode !== MODE_CLICKONLY && infiniteRef.current && isDownbeat && playBeat > 0 && onLoop) {
                  playingBars.current++;
                  const totalBarsPerSet = totalInSet * bpe;
                  if (playingBars.current % totalBarsPerSet === 0) {
                    const t2 = t;
                    exercisesPlayed.current = 0;
                    setTimeout(() => { if (stoppedRef.current) return; onLoop(); }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                  }
                  if (totalInSet > 1 && playingBars.current % totalBarsPerSet === totalBarsPerSet - bpe) {
                    const t2 = t;
                    setTimeout(() => { if (stoppedRef.current) return; onNext(-1); }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                  }
                }

                if (currentMode === MODE_CLICKONLY) {
                  if (isDownbeat && playBeat > 0) {
                    const newBarCount = lastExercise.current + 1;
                    lastExercise.current = newBarCount;
                    setTimeout(() => { if (stoppedRef.current) return; onChange(newBarCount); }, Math.max(0, (t - ctx.currentTime) * 1000));
                  }
                  playBeatCount.current++;
                } else if (isNewExercise) {
                  if (setEndPending.current) {
                    if (loopingRef.current) {
                      const current = lastExercise.current;
                      setTimeout(() => { if (stoppedRef.current) return; onChange(current); }, Math.max(0, (t - ctx.currentTime) * 1000));
                      playBeatCount.current = 1;
                    } else {
                      clearInterval(schedulerRef.current);
                      scheduleEndBell(ctx, nextBeatTime.current, vol);
                      const t2 = t;
                      setTimeout(() => { if (stoppedRef.current) return; onDone(); }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                      setEndPending.current = false;
                    }
                  } else if (loopingRef.current) {
                    const current = lastExercise.current;
                    setTimeout(() => { if (stoppedRef.current) return; onChange(current); }, Math.max(0, (t - ctx.currentTime) * 1000));
                    playBeatCount.current = 1;
                  } else {
                    const isShuffleSeq = currentMode === MODE_FULLSET || currentMode === MODE_SEQUENTIAL;
                    const setFinished = isShuffleSeq && exercisesPlayed.current >= totalInSet - 1;
                    const setDone = setFinished && !infiniteRef.current;

                    if (setDone) {
                      const incoming = nextExercise.current;
                      lastExercise.current = incoming;
                      setEndPending.current = true;

                      if (interCountInBeats > 0) {
                        nextExercise.current = -1;
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(-1); setPhase("countin"); setCountInBeat(1); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                        countInProgress.current = true;
                        countInBeatPos.current = 1;
                        playBeatCount.current = 0;
                        scheduleWoodblock(ctx, nextBeatTime.current, true, vol, mSound);
                        if (countInBeatPos.current >= interCountInBeats) {
                          countInProgress.current = false; countInBeatPos.current = 0;
                          setTimeout(() => { if (stoppedRef.current) return; setPhase("playing"); },
                            Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
                        }
                      } else {
                        const t2 = t;
                        setTimeout(() => {
                          if (stoppedRef.current) return;
                          onChange(incoming);
                          onNext(-1);
                        }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                        playBeatCount.current = 1;
                      }
                    } else {
                      exercisesPlayed.current++;
                      const incoming = nextExercise.current;
                      lastExercise.current = incoming;

                      const upcoming = pickNext(min, max, incoming, currentMode);
                      nextExercise.current = upcoming;

                      if (interCountInBeats > 0) {
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(incoming); setPhase("countin"); setCountInBeat(1); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                        countInProgress.current = true;
                        countInBeatPos.current = 1;
                        playBeatCount.current = 0;
                        scheduleWoodblock(ctx, nextBeatTime.current, true, vol, mSound);
                        if (countInBeatPos.current >= interCountInBeats) {
                          countInProgress.current = false; countInBeatPos.current = 0;
                          setTimeout(() => { if (stoppedRef.current) return; onNext(upcoming); setPhase("playing"); },
                            Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
                        }
                      } else {
                        playBeatCount.current = 1;
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(upcoming); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                      }
                    }
                  }
                } else {
                  playBeatCount.current++;
                }
              }
            }

            beatCount.current++;
            nextBeatTime.current += beatLen;
          }
        };

        schedulerFn.current = scheduler;
        schedulerRef.current = setInterval(scheduler, SCHEDULER_INTERVAL_MS);
        return () => clearInterval(schedulerRef.current);
      }, [running, getCtx, pickNext]);

      return { currentBeat, currentBar, currentSubdiv, phase, flashOn, countInBeat, isResuming, getCtx };
    }

    function fmt(n) { return n < 10 ? `0${n}` : `${n}`; }
    function numToLetter(n) { return String.fromCharCode(64 + n); }
    function fmtEx(n, lm) { return lm ? numToLetter(n) : fmt(n); }

    function NumpadGrid({ onDigit, onBackspace, onClear }) {
      return (
        <div className="numpad-grid">
          {[7,8,9,4,5,6,1,2,3].map(d => (
            <button key={d} className="numpad-key" onPointerDown={(e) => { e.preventDefault(); onDigit(String(d)); }}>{d}</button>
          ))}
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onClear(); }}>✕</button>
          <button className="numpad-key" onPointerDown={(e) => { e.preventDefault(); onDigit('0'); }}>0</button>
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onBackspace(); }}>⌫</button>
        </div>
      );
    }

    function LetterpadGrid({ onLetter, onBackspace, onClear }) {
      return (
        <div className="letterpad-grid">
          {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => (
            <button key={l} className="numpad-key letter-key" onPointerDown={(e) => { e.preventDefault(); onLetter(l); }}>{l}</button>
          ))}
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onClear(); }}>✕</button>
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onBackspace(); }}>⌫</button>
        </div>
      );
    }

    function NumpadPopup({ label, initialValue, onConfirm, onClose, letterMode }) {
      const [inputStr, setInputStr] = useState('');
      const handleDigit = (d) => setInputStr(s => s.length < 3 ? s + d : s);
      const handleLetter = (l) => setInputStr(l);
      const handleBackspace = () => setInputStr(s => s.slice(0, -1));
      const handleClear = () => setInputStr('');
      const handleOk = () => {
        if (letterMode) {
          const raw = isEmpty ? numToLetter(initialValue) : inputStr;
          const v = raw.toUpperCase().charCodeAt(0) - 64;
          const c = isNaN(v) || v < 1 ? 1 : Math.min(v, EX_MAX_LETTERS);
          onConfirm(c);
        } else {
          const raw = isEmpty ? String(initialValue) : inputStr;
          const v = parseInt(raw);
          const c = isNaN(v) || v < EX_MIN ? EX_MIN : Math.min(v, EX_MAX);
          onConfirm(c);
        }
      };
      const isEmpty = inputStr === '';
      const placeholder = letterMode ? numToLetter(initialValue) : String(initialValue);
      return ReactDOM.createPortal(
        <>
          <div className="numpad-backdrop" onClick={onClose} />
          <div className="numpad-popup">
            <div className="numpad-header">{label}</div>
            <div className={`numpad-display${isEmpty ? ' placeholder' : ''}`}>{isEmpty ? placeholder : inputStr}</div>
            {letterMode
              ? <LetterpadGrid onLetter={handleLetter} onBackspace={handleBackspace} onClear={handleClear} />
              : <NumpadGrid onDigit={handleDigit} onBackspace={handleBackspace} onClear={handleClear} />}
            <div className="numpad-actions">
              <button className="numpad-cancel" onPointerDown={(e) => e.preventDefault()} onClick={onClose}>Cancel</button>
              <button className="numpad-ok" onPointerDown={(e) => e.preventDefault()} onClick={handleOk}>OK</button>
            </div>
          </div>
        </>,
        document.body
      );
    }

    function BarPickerPopup({ pickedNums, onConfirm, onClose, letterMode }) {
      const [localPicked, setLocalPicked] = useState(() => [...pickedNums]);
      const [inputStr, setInputStr] = useState('');
      const [flashChip, setFlashChip] = useState(null);
      const handleDigit = (d) => setInputStr(s => s.length < 3 ? s + d : s);
      const handleLetter = (l) => setInputStr(l);
      const handleBackspace = () => {
        if (inputStr !== '') setInputStr(s => s.slice(0, -1));
        else setLocalPicked(prev => prev.slice(0, -1));
      };
      const handleClear = () => { if (inputStr !== '') setInputStr(''); else setLocalPicked([]); };
      const handleAdd = () => {
        let c;
        if (letterMode) {
          if (!/^[A-Za-z]$/.test(inputStr)) return;
          c = inputStr.toUpperCase().charCodeAt(0) - 64;
        } else {
          const v = parseInt(inputStr);
          if (isNaN(v)) return;
          c = Math.max(EX_MIN, Math.min(EX_MAX, v));
        }
        if (localPicked.includes(c)) {
          setFlashChip(c);
          setTimeout(() => setFlashChip(null), 400);
          setInputStr('');
          return;
        }
        setLocalPicked(prev => [...prev, c].sort((a, b) => a - b));
        setInputStr('');
      };
      const handleRemove = (n) => setLocalPicked(prev => prev.filter(x => x !== n));
      const handleDone = () => onConfirm([...localPicked]);
      const isEmpty = inputStr === '';
      const parsedValid = letterMode ? (!isEmpty && /^[A-Za-z]$/.test(inputStr)) : (!isEmpty && !isNaN(parseInt(inputStr)));
      return ReactDOM.createPortal(
        <>
          <div className="numpad-backdrop" onClick={onClose} />
          <div className="picker-popup">
            <div className="numpad-header">Pick exercises</div>
            <div className="picker-chips">
              {localPicked.length === 0
                ? <span className="picker-chips-empty">No exercises selected</span>
                : localPicked.map(n => (
                    <button key={n} className="picker-chip"
                      style={flashChip === n ? { borderColor: '#ff4500', color: '#ff4500' } : {}}
                      onPointerDown={(e) => { e.preventDefault(); handleRemove(n); }}>
                      {letterMode ? numToLetter(n) : String(n)}
                    </button>
                  ))
              }
            </div>
            <div className="picker-divider" />
            <div className={`numpad-display${isEmpty ? ' empty' : ''}`}>{isEmpty ? '–' : inputStr}</div>
            {letterMode
              ? <LetterpadGrid onLetter={handleLetter} onBackspace={handleBackspace} onClear={handleClear} />
              : <NumpadGrid onDigit={handleDigit} onBackspace={handleBackspace} onClear={handleClear} />}
            <button className="picker-add-btn" onPointerDown={(e) => e.preventDefault()} onClick={handleAdd} disabled={!parsedValid}>Add</button>
            <button className="picker-done-btn" onPointerDown={(e) => e.preventDefault()} onClick={handleDone}>Done</button>
          </div>
        </>,
        document.body
      );
    }

    function blockWidth(n) {
      if (n <= 8)  return 20;
      if (n <= 12) return 16;
      return 12;
    }

    function blockGap(n) {
      return n <= 12 ? 4 : 3;
    }

    // Amber brightness levels for bar-within-phrase: index = bar position (0-based)
    const BAR_PHRASE_COLOURS = {
      1: ["#f5c842"],
      2: ["#7a6421", "#f5c842"],
      4: ["#3d3210", "#7a6421", "#b89631", "#f5c842"],
    };

    function barPhraseColour(exerciseLength, currentBar) {
      const colours = BAR_PHRASE_COLOURS[exerciseLength] || ["#f5c842"];
      const barWithinPhrase = currentBar % exerciseLength;
      return colours[barWithinPhrase] || "#f5c842";
    }

    function BarProgress({ barsPerExercise, currentRound, currentBar, exerciseLength, looping, phase, countInBars, countInBeat, beatsPerBar, barFlash }) {
      if (phase === "idle" || (phase === "countin" && countInBars < 2)) {
        if (barsPerExercise <= BAR_BLOCKS_MAX) {
          const bw = blockWidth(barsPerExercise);
          const bg = blockGap(barsPerExercise);
          return (
            <div className="bar-progress" style={{ gap: `${bg}px` }}>
              {Array.from({ length: barsPerExercise }).map((_, i) => (
                <div key={i} className="bar-block" style={{ width: `${bw}px` }} />
              ))}
            </div>
          );
        } else {
          return (
            <div className="bar-progress-continuous">
              <div className="bar-progress-track">
                <div className="bar-progress-fill" style={{ width: "0%", background: "#f5c842" }} />
              </div>
            </div>
          );
        }
      }

      if (phase === "playing") {
        const activeColour = barPhraseColour(exerciseLength, currentBar);

        if (barsPerExercise <= BAR_BLOCKS_MAX) {
          const bw = blockWidth(barsPerExercise);
          const bg = blockGap(barsPerExercise);
          return (
            <div className="bar-progress" style={{ gap: `${bg}px` }}>
              {Array.from({ length: barsPerExercise }).map((_, i) => (
                <div key={i}
                  className={`bar-block${i < currentRound - 1 ? " done" : ""}`}
                  style={{
                    width: `${bw}px`,
                    background: i < currentRound - 1 ? undefined : i === currentRound - 1 ? activeColour : undefined,
                  }}
                />
              ))}
            </div>
          );
        } else {
          const pct = Math.min(100, Math.round((currentRound / barsPerExercise) * 100));
          const nearEnd = !looping && currentRound >= barsPerExercise - 1;
          const fillOpacity = barFlash ? 1 : 0.6;
          return (
            <div className="bar-progress-continuous">
              <div className="bar-progress-track">
                <div className="bar-progress-fill" style={{ width: `${pct}%`, background: "#f5c842", opacity: fillOpacity, transition: barFlash ? "none" : "width 0.15s, opacity 0.25s" }} />
              </div>
              <span className={`bar-progress-counter${nearEnd ? " near-end" : ""}`}>
                {`${currentRound}/${barsPerExercise}`}
              </span>
            </div>
          );
        }
      }

      if (phase === "countin" && countInBars >= 2) {
        const countInBar = countInBeat > 0 ? Math.floor((countInBeat - 1) / beatsPerBar) : 0;
        return (
          <div className="bar-progress">
            {Array.from({ length: countInBars }).map((_, i) => (
              <div key={i}
                className={`bar-block${i < countInBar ? " countin-done" : i === countInBar ? " countin-current" : ""}`}
                style={{ width: "20px" }}
              />
            ))}
          </div>
        );
      }

      return <div style={{ height: "5px" }} />;
    }

    function CompactSelector({ id, value, options, onChange, disabled, openSelector, setOpenSelector, getLabel, renderOption, buttonLabel, popupClassName, footer }) {
      const btnRef = useRef(null);
      const isOpen = openSelector === id;
      const [popupStyle, setPopupStyle] = useState({});

      useEffect(() => {
        if (isOpen && btnRef.current) {
          const rect = btnRef.current.getBoundingClientRect();
          setPopupStyle({
            left: rect.left,
            bottom: window.innerHeight - rect.top + 6,
            minWidth: rect.width,
          });
        }
      }, [isOpen]);

      const displayLabel = buttonLabel !== undefined ? buttonLabel : (getLabel ? getLabel(value) : String(value));

      const open = () => { if (!disabled) setOpenSelector(isOpen ? null : id); };
      const select = (opt) => { onChange(opt); setOpenSelector(null); };

      return (
        <>
          <button ref={btnRef} className={`compact-sel-btn${isOpen ? " open" : ""}`} onClick={open} disabled={disabled}>
            {displayLabel}
          </button>
          {isOpen && ReactDOM.createPortal(
            <>
              <div className="compact-popup-backdrop" onClick={() => setOpenSelector(null)} />
              <div className={`compact-popup${popupClassName ? ` ${popupClassName}` : ""}`} style={popupStyle}>
                {options.map((opt, i) => {
                  const optLabel = getLabel ? getLabel(opt) : String(opt);
                  const isActive = getLabel ? getLabel(opt) === getLabel(value) : opt === value;
                  return (
                    <button key={i} className={`sel-btn${isActive ? " active" : ""}`}
                      onPointerDown={(e) => e.stopPropagation()}
                      onClick={() => select(opt)}>
                      {renderOption ? renderOption(opt) : optLabel}
                    </button>
                  );
                })}
                {footer && (
                  <>
                    <div style={{ width: '100%', height: 1, background: '#333', margin: '0.2rem 0' }} />
                    {footer}
                  </>
                )}
              </div>
            </>,
            document.body
          )}
        </>
      );
    }

    function useNudge(setter, delta) {
      const intervalRef = useRef(null);
      const stop = () => {
        clearTimeout(intervalRef.current);
        clearInterval(intervalRef.current);
        intervalRef.current = null;
      };
      const start = () => {
        const step = () => setter(v => {
          const next = Math.round((v + delta) * 100) / 100;
          return delta < 0 ? Math.max(0, next) : Math.min(1, next);
        });
        step();
        intervalRef.current = setTimeout(() => {
          intervalRef.current = setInterval(step, 80);
        }, 400);
      };
      useEffect(() => () => stop(), []);
      return { onMouseDown: start, onMouseUp: stop, onMouseLeave: stop, onTouchStart: (e) => { e.preventDefault(); start(); }, onTouchEnd: stop };
    }

    function VolPopup({ volBtnRef, volume, setVolume, subdivVol, setSubdivVol, subdivVol2, setSubdivVol2, subdivVol3, setSubdivVol3, subdivision, setSubdivision }) {
      const [style, setStyle] = useState({});
      useEffect(() => {
        if (volBtnRef.current) {
          const rect = volBtnRef.current.getBoundingClientRect();
          setStyle({
            position: 'fixed',
            right: window.innerWidth - rect.right,
            bottom: window.innerHeight - rect.top + 6,
            zIndex: 51,
          });
        }
      }, []);
      const volDown  = useNudge(setVolume,     -0.05);
      const volUp    = useNudge(setVolume,      0.05);
      const subDown  = useNudge(setSubdivVol,  -0.05);
      const subUp    = useNudge(setSubdivVol,   0.05);
      const sub2Down = useNudge(setSubdivVol2, -0.05);
      const sub2Up   = useNudge(setSubdivVol2,  0.05);
      const sub3Down = useNudge(setSubdivVol3, -0.05);
      const sub3Up   = useNudge(setSubdivVol3,  0.05);

      const rows = [
        { value: 2, nudgeDown: subDown,  nudgeUp: subUp,  vol: subdivVol,  setVol: setSubdivVol },
        { value: 4, nudgeDown: sub2Down, nudgeUp: sub2Up, vol: subdivVol2, setVol: setSubdivVol2 },
        { value: 3, nudgeDown: sub3Down, nudgeUp: sub3Up, vol: subdivVol3, setVol: setSubdivVol3 },
      ];

      return (
        <div className="vol-slider-row" style={style}>
          {/* Master volume */}
          <div className="vol-slider-item">
            <span>Master</span>
            <button className="vol-nudge-btn" {...volDown}>−</button>
            <input type="range" min={0} max={1} step={0.05} value={volume} onChange={e => setVolume(Number(e.target.value))} />
            <button className="vol-nudge-btn" {...volUp}>+</button>
          </div>
          {/* Subdivision rows — always visible, tap icon to activate/deactivate */}
          {rows.map(row => {
            const active = subdivision === row.value || (row.value === 2 && subdivision === 4);
            const isSelector = row.value !== 2 || subdivision !== 4; // ♪♪ in 16th mode = vol only, not selector
            return (
              <div key={row.value} className={`vol-slider-item${active ? '' : ' vol-subdiv-inactive'}`}>
                <button
                  className="vol-subdiv-icon-btn"
                  onClick={() => {
                    if (isSelector) setSubdivision(subdivision === row.value ? 1 : row.value);
                  }}
                  style={!isSelector ? { cursor: 'default' } : {}}>
                  <SubdivSVG value={row.value} />
                </button>
                <button className="vol-nudge-btn" {...row.nudgeDown}>−</button>
                <input type="range" min={0} max={1} step={0.05} value={row.vol} onChange={e => row.setVol(Number(e.target.value))} />
                <button className="vol-nudge-btn" {...row.nudgeUp}>+</button>
              </div>
            );
          })}
        </div>
      );
    }

    function useLongPressSimple(callback) {
      const timerRef = useRef(null);
      const start = (e) => {
        e.preventDefault();
        callback();
        timerRef.current = setTimeout(() => {
          timerRef.current = setInterval(callback, 80);
        }, 400);
      };
      const stop = () => {
        if (timerRef.current) { clearInterval(timerRef.current); clearTimeout(timerRef.current); timerRef.current = null; }
      };
      return { onPointerDown: start, onPointerUp: stop, onPointerLeave: stop, onPointerCancel: stop };
    }

    function BpmAutoPopup({
      mode, bpm, bpmAuto, setBpmAuto,
      bpmAutoStep, setBpmAutoStep, bpmAutoDir, setBpmAutoDir,
      bpmAutoTrigger, setBpmAutoTrigger,
      bpmAutoBarInterval, setBpmAutoBarInterval,
      bpmAutoSecInterval, setBpmAutoSecInterval,
      bpmAutoRandom, setBpmAutoRandom, bpmAutoMin, setBpmAutoMin, bpmAutoMax, setBpmAutoMax,
      anchorRef, onClose,
    }) {
      const [popupStyle, setPopupStyle] = useState({});
      const [localMode, setLocalMode] = useState(bpmAutoRandom ? 'random' : 'increment');
      const isMetronome = mode === MODE_CLICKONLY;

      useEffect(() => {
        if (anchorRef.current) {
          const rect = anchorRef.current.getBoundingClientRect();
          const popupWidth = 260;
          const centreLeft = Math.round((window.innerWidth - popupWidth) / 2);
          const anchorLeft = Math.min(rect.left, window.innerWidth - popupWidth - 8);
          setPopupStyle({
            left: Math.max(8, window.innerWidth < 500 ? centreLeft : anchorLeft),
            bottom: window.innerHeight - rect.top + 6,
          });
        }
        const halfSpan = Math.round(bpm * 0.035);
        setBpmAutoMin(Math.max(BPM_MIN, bpm - halfSpan));
        setBpmAutoMax(Math.min(BPM_MAX, bpm + halfSpan));
        if (isMetronome && bpmAutoTrigger === 'set') setBpmAutoTrigger('bars');
      }, []);

      const stepInc = () => setBpmAutoStep(s => Math.min(10, s + 1));
      const stepDec = () => setBpmAutoStep(s => Math.max(1, s - 1));
      const stepIncHandlers = useLongPressSimple(stepInc);
      const stepDecHandlers = useLongPressSimple(stepDec);

      const activeInterval = bpmAutoTrigger === 'seconds' ? bpmAutoSecInterval : bpmAutoBarInterval;
      const setActiveInterval = bpmAutoTrigger === 'seconds' ? setBpmAutoSecInterval : setBpmAutoBarInterval;
      const intervalMax = bpmAutoTrigger === 'seconds' ? 3600 : 999;
      const intervalInc = () => setActiveInterval(s => Math.min(intervalMax, s + 1));
      const intervalDec = () => setActiveInterval(s => Math.max(1, s - 1));
      const intervalIncHandlers = useLongPressSimple(intervalInc);
      const intervalDecHandlers = useLongPressSimple(intervalDec);

      const rangeMinInc = () => setBpmAutoMin(v => Math.min(bpmAutoMax, v + 1));
      const rangeMinDec = () => setBpmAutoMin(v => Math.max(BPM_MIN, v - 1));
      const rangeMaxInc = () => setBpmAutoMax(v => Math.min(BPM_MAX, Math.min(bpmAutoMin + 8, v + 1)));
      const rangeMaxDec = () => setBpmAutoMax(v => Math.max(bpmAutoMin, v - 1));
      const rangeMinIncHandlers = useLongPressSimple(rangeMinInc);
      const rangeMinDecHandlers = useLongPressSimple(rangeMinDec);
      const rangeMaxIncHandlers = useLongPressSimple(rangeMaxInc);
      const rangeMaxDecHandlers = useLongPressSimple(rangeMaxDec);

      return ReactDOM.createPortal(
        <>
          <div className="bpm-auto-backdrop" onClick={onClose} />
          <div className="bpm-auto-popup" style={popupStyle}>

              {!isMetronome && localMode === 'random' && (
                <div className="bpm-auto-row">
                  <span className="bpm-auto-label">Min</span>

                    <button className="bpm-auto-step-btn right" {...rangeMaxIncHandlers}>+</button>

              )}
            </div>
          </div>
        </>,
        document.body
      );
    }

    function NumpadPopup({ label, initialValue, onConfirm, onClose, letterMode }) {
      const [inputStr, setInputStr] = useState('');
      const handleDigit = (d) => setInputStr(s => s.length < 3 ? s + d : s);
      const handleLetter = (l) => setInputStr(l);
      const handleBackspace = () => setInputStr(s => s.slice(0, -1));
      const handleClear = () => setInputStr('');
      const handleOk = () => {
        if (letterMode) {
          const raw = isEmpty ? numToLetter(initialValue) : inputStr;
          const v = raw.toUpperCase().charCodeAt(0) - 64;
          const c = isNaN(v) || v < 1 ? 1 : Math.min(v, EX_MAX_LETTERS);
          onConfirm(c);
        } else {
          const raw = isEmpty ? String(initialValue) : inputStr;
          const v = parseInt(raw);
          const c = isNaN(v) || v < EX_MIN ? EX_MIN : Math.min(v, EX_MAX);
          onConfirm(c);
        }
      };
      const isEmpty = inputStr === '';
      const placeholder = letterMode ? numToLetter(initialValue) : String(initialValue);
      return ReactDOM.createPortal(
        <>
          <div className="numpad-backdrop" onClick={onClose} />
          <div className="numpad-popup">
            <div className="numpad-header">{label}</div>
            <div className={`numpad-display${isEmpty ? ' placeholder' : ''}`}>{isEmpty ? placeholder : inputStr}</div>
            {letterMode
              ? <LetterpadGrid onLetter={handleLetter} onBackspace={handleBackspace} onClear={handleClear} />
              : <NumpadGrid onDigit={handleDigit} onBackspace={handleBackspace} onClear={handleClear} />}
            <div className="numpad-actions">
              <button className="numpad-cancel" onPointerDown={(e) => e.preventDefault()} onClick={onClose}>Cancel</button>
              <button className="numpad-ok" onPointerDown={(e) => e.preventDefault()} onClick={handleOk}>OK</button>
            </div>
          </div>
        </>,
        document.body
      );
    }

    function BarPickerPopup({ pickedNums, onConfirm, onClose, letterMode }) {
      const [localPicked, setLocalPicked] = useState(() => [...pickedNums]);
      const [inputStr, setInputStr] = useState('');
      const [flashChip, setFlashChip] = useState(null);
      const handleDigit = (d) => setInputStr(s => s.length < 3 ? s + d : s);
      const handleLetter = (l) => setInputStr(l);
      const handleBackspace = () => {
        if (inputStr !== '') setInputStr(s => s.slice(0, -1));
        else setLocalPicked(prev => prev.slice(0, -1));
      };
      const handleClear = () => { if (inputStr !== '') setInputStr(''); else setLocalPicked([]); };
      const handleAdd = () => {
        let c;
        if (letterMode) {
          if (!/^[A-Za-z]$/.test(inputStr)) return;
          c = inputStr.toUpperCase().charCodeAt(0) - 64;
        } else {
          const v = parseInt(inputStr);
          if (isNaN(v)) return;
          c = Math.max(EX_MIN, Math.min(EX_MAX, v));
        }
        if (localPicked.includes(c)) {
          setFlashChip(c);
          setTimeout(() => setFlashChip(null), 400);
          setInputStr('');
          return;
        }
        setLocalPicked(prev => [...prev, c].sort((a, b) => a - b));
        setInputStr('');
      };
      const handleRemove = (n) => setLocalPicked(prev => prev.filter(x => x !== n));
      const handleDone = () => onConfirm([...localPicked]);
      const isEmpty = inputStr === '';
      const parsedValid = letterMode ? (!isEmpty && /^[A-Za-z]$/.test(inputStr)) : (!isEmpty && !isNaN(parseInt(inputStr)));
      return ReactDOM.createPortal(
        <>
          <div className="numpad-backdrop" onClick={onClose} />
          <div className="picker-popup">
            <div className="numpad-header">Pick exercises</div>
            <div className="picker-chips">
              {localPicked.length === 0
                ? <span className="picker-chips-empty">No exercises selected</span>
                : localPicked.map(n => (
                    <button key={n} className="picker-chip"
                      style={flashChip === n ? { borderColor: '#ff4500', color: '#ff4500' } : {}}
                      onPointerDown={(e) => { e.preventDefault(); handleRemove(n); }}>
                      {letterMode ? numToLetter(n) : String(n)}
                    </button>
                  ))
              }
            </div>
            <div className="picker-divider" />
            <div className={`numpad-display${isEmpty ? ' empty' : ''}`}>{isEmpty ? '–' : inputStr}</div>
            {letterMode
              ? <LetterpadGrid onLetter={handleLetter} onBackspace={handleBackspace} onClear={handleClear} />
              : <NumpadGrid onDigit={handleDigit} onBackspace={handleBackspace} onClear={handleClear} />}
            <button className="picker-add-btn" onPointerDown={(e) => e.preventDefault()} onClick={handleAdd} disabled={!parsedValid}>Add</button>
            <button className="picker-done-btn" onPointerDown={(e) => e.preventDefault()} onClick={handleDone}>Done</button>
          </div>
        </>,
        document.body
      );
    }

    function fmt(n) { return n < 10 ? `0${n}` : `${n}`; }
    function numToLetter(n) { return String.fromCharCode(64 + n); }
    function fmtEx(n, lm) { return lm ? numToLetter(n) : fmt(n); }

    // ── Bar progress display ───────────────────────────────────────────────────

    function blockWidth(n) {
      if (n <= 8)  return 20;
      if (n <= 12) return 16;
      return 12;
    }

    function blockGap(n) {
      return n <= 12 ? 4 : 3;
    }

    // Amber brightness levels for bar-within-phrase: index = bar position (0-based)
    const BAR_PHRASE_COLOURS = {
      1: ["#f5c842"],
      2: ["#7a6421", "#f5c842"],
      4: ["#3d3210", "#7a6421", "#b89631", "#f5c842"],
    };

    function barPhraseColour(exerciseLength, currentBar) {
      const colours = BAR_PHRASE_COLOURS[exerciseLength] || ["#f5c842"];
      const barWithinPhrase = currentBar % exerciseLength;
      return colours[barWithinPhrase] || "#f5c842";
    }

    function BarProgress({ barsPerExercise, currentRound, currentBar, exerciseLength, looping, phase, countInBars, countInBeat, beatsPerBar, barFlash }) {
      if (phase === "idle" || (phase === "countin" && countInBars < 2)) {
        if (barsPerExercise <= BAR_BLOCKS_MAX) {
          const bw = blockWidth(barsPerExercise);
          const bg = blockGap(barsPerExercise);
          return (
            <div className="bar-progress" style={{ gap: `${bg}px` }}>
              {Array.from({ length: barsPerExercise }).map((_, i) => (
                <div key={i} className="bar-block" style={{ width: `${bw}px` }} />
              ))}
            </div>
          );
        } else {
          return (
            <div className="bar-progress-continuous">
              <div className="bar-progress-track">
                <div className="bar-progress-fill" style={{ width: "0%", background: "#f5c842" }} />
              </div>
            </div>
          );
        }
      }

      if (phase === "playing") {
        const activeColour = barPhraseColour(exerciseLength, currentBar);

        if (barsPerExercise <= BAR_BLOCKS_MAX) {
          const bw = blockWidth(barsPerExercise);
          const bg = blockGap(barsPerExercise);
          return (
            <div className="bar-progress" style={{ gap: `${bg}px` }}>
              {Array.from({ length: barsPerExercise }).map((_, i) => (
                <div key={i}
                  className={`bar-block${i < currentRound - 1 ? " done" : ""}`}
                  style={{
                    width: `${bw}px`,
                    background: i < currentRound - 1 ? undefined : i === currentRound - 1 ? activeColour : undefined,
                  }}
                />
              ))}
            </div>
          );
        } else {
          const pct = Math.min(100, Math.round((currentRound / barsPerExercise) * 100));
          const nearEnd = !looping && currentRound >= barsPerExercise - 1;
          const fillOpacity = barFlash ? 1 : 0.6;
          return (
            <div className="bar-progress-continuous">
              <div className="bar-progress-track">
                <div className="bar-progress-fill" style={{ width: `${pct}%`, background: "#f5c842", opacity: fillOpacity, transition: barFlash ? "none" : "width 0.15s, opacity 0.25s" }} />
              </div>
              <span className={`bar-progress-counter${nearEnd ? " near-end" : ""}`}>
                {`${currentRound}/${barsPerExercise}`}
              </span>
            </div>
          );
        }
      }

      if (phase === "countin" && countInBars >= 2) {
        const countInBar = countInBeat > 0 ? Math.floor((countInBeat - 1) / beatsPerBar) : 0;
        return (
          <div className="bar-progress">
            {Array.from({ length: countInBars }).map((_, i) => (
              <div key={i}
                className={`bar-block${i < countInBar ? " countin-done" : i === countInBar ? " countin-current" : ""}`}
                style={{ width: "20px" }}
              />
            ))}
          </div>
        );
      }

      return <div style={{ height: "5px" }} />;
    }

    // ── App ────────────────────────────────────────────────────────────────────

    function CompactSelector({ id, value, options, onChange, disabled, openSelector, setOpenSelector, getLabel, buttonLabel, footer }) {
      const btnRef = useRef(null);
      const isOpen = openSelector === id;
      const [popupStyle, setPopupStyle] = useState({});

      useEffect(() => {
        if (isOpen && btnRef.current) {
          const rect = btnRef.current.getBoundingClientRect();
          setPopupStyle({
            left: rect.left,
            bottom: window.innerHeight - rect.top + 6,
            minWidth: rect.width,
          });
        }
      }, [isOpen]);

      const displayLabel = buttonLabel !== undefined ? buttonLabel : (getLabel ? getLabel(value) : String(value));

      const open = () => { if (!disabled) setOpenSelector(isOpen ? null : id); };
      const select = (opt) => { onChange(opt); setOpenSelector(null); };

      return (
        <>
          <button ref={btnRef} className={`compact-sel-btn${isOpen ? " open" : ""}`} onClick={open} disabled={disabled}>
            {displayLabel}
          </button>
          {isOpen && ReactDOM.createPortal(
            <>
              <div className="compact-popup-backdrop" onClick={() => setOpenSelector(null)} />
              <div className="compact-popup" style={popupStyle}>
                {options.map((opt, i) => {
                  const optLabel = getLabel ? getLabel(opt) : String(opt);
                  const isActive = getLabel ? getLabel(opt) === getLabel(value) : opt === value;
                  return (
                    <button key={i} className={`sel-btn${isActive ? " active" : ""}`}
                      onPointerDown={(e) => e.stopPropagation()}
                      onClick={() => select(opt)}>
                      {optLabel}
                    </button>
                  );
                })}
                {footer && (
                  <>
                    <div style={{ width: '100%', height: 1, background: '#333', margin: '0.2rem 0' }} />
                    {footer}
                  </>
                )}
              </div>
            </>,
            document.body
          )}
        </>
      );
    }

                        setLetterMode(next);
                        showAppToast(next ? "Letter mode" : "Number mode");
                        if (next && !letterModeSeenRef.current) {
                          letterModeSeenRef.current = true;
                          try { localStorage.setItem('shuffle_lm_seen', '1'); } catch {}
                          setShowLetterModePopup(true);
                        }
                      }}>{letterMode ? "Turn letter mode off" : "Turn letter mode on"}</button>
                      <button className="settings-menu-item" onClick={() => {
                        setSettingsMenuOpen(false);
                        const p = new URLSearchParams();
                        p.set("bpm",    String(bpm));
                        p.set("sig",    timeSig.label);
                        p.set("exlen",  String(exerciseLength));
                        if (mode !== MODE_CLICKONLY) {
                          if (exMode === "pick" && pickedNums.length > 0) {
                            p.set("picks", pickedNums.join(","));
                          } else {
                            p.set("min", String(minEx));
                            p.set("max", String(maxEx));
                          }
                          p.set("rounds", String(barsPerExercise));
                        }
                        p.set("cib",  String(countInBars));
                        if (countInEvery) p.set("cie", "1");
                        p.set("mode", mode);
                        if (infinite && mode !== MODE_CLICKONLY) p.set("inf", "1");
                        if (letterMode) p.set("lm", "1");
                        const url = `${window.location.origin}${window.location.pathname}?${p.toString()}`;
                        navigator.clipboard.writeText(url)
                          .then(() => showAppToast("Link copied!"))
                          .catch(() => showAppToast("Copy failed"));
                      }}>Share settings</button>
                      <button className="settings-menu-item settings-menu-item--destructive" onClick={() => {
                        setSettingsMenuOpen(false);
                        handleStop();
                        setBpm(80);
                        setTimeSig(TIME_SIGS[2]);
                        setBarsPerExercise(4);
                        setExerciseLength(1);
                        setMinEx(1);
                        setMaxEx(4);
                        setCountInBars(1);
                        setCountInEvery(true);
                        setMode(MODE_FULLSET);
                        setInfinite(false);
                        setStopwatch(false);
                        setInfiniteByMode({ [MODE_FULLSET]: false, [MODE_SEQUENTIAL]: false });
                        setStopwatchPref(false);
                        setVolume(1.0);
                        setExMode('range');
                        setPickedNums([]);
                        setLetterMode(false);
                        showAppToast("Settings reset");
                      }}>Reset to defaults</button>
                    </div>
                  </>
                )}
            </div>}
          </div>
          <div className="app-subtitle">practice randomiser and metronome for musicians</div>
          </div>

          {showHelp && (
            <>
              {(helpNeedsScroll && !helpScrolledToEnd) && <div className="help-scroll-fade" />}
              <div className="help-overlay" ref={helpOverlayRef}
                onClick={() => setShowHelp(false)}
                onScroll={(e) => {
                  const el = e.currentTarget;
                  const atEnd = el.scrollTop + el.clientHeight >= el.scrollHeight - 8;
                  setHelpScrolledToEnd(atEnd);
                }}>
                <div className="help-content" onClick={e => e.stopPropagation()}>
                <button className="help-close-x" onClick={() => setShowHelp(false)}>✕</button>
                <div className="help-title">How to use Shuffle</div>
                <div className="help-section">
                  <p>Shuffle randomises your exercises to help you practise more effectively.</p>
                </div>
                <div className="help-section">
                  <h3>Set up</h3>
                  <p>Choose your mode, then configure your session: exercise range (swipe up/down to nudge) or pick specific exercises, BPM, time signature, exercise length (always 1 bar in pick mode), and rounds.</p>
                  <p>Tap Count in to set the count-in length. Enable "count in every exercise" if you want a count-in before each exercise, not just the first.</p>
                </div>
                <div className="help-section">
                  <h3>Modes</h3>
                  <ul style={{ margin: 0, paddingLeft: '1.2rem', listStyleType: 'disc' }}>
                    <li>Shuffle — plays every exercise in random order, then stops. Tap Shuffle again to turn on ∞ mode — it loops continuously.</li>
                    <li>Sequence — plays exercises in order, then stops. Tap Sequence again to turn on ∞ mode — it loops continuously.</li>
                    <li>Metronome — bar counter, runs until you stop it. Tap Metronome again to switch to stopwatch mode — shows elapsed time instead of bars.</li>
                  </ul>
                </div>
                <div className="help-section">
                  <h3>Loop / Pause / Stop</h3>
                  <ul style={{ margin: 0, paddingLeft: '1.2rem', listStyleType: 'disc' }}>
                    <li>Loop — repeats the current exercise indefinitely. Tap again to turn off loop mode; it will exit at the end of the current round.</li>
                    <li>Pause — stops the metronome. Resuming restarts the current exercise from the beginning with a count-in.</li>
                    <li>Stop — ends the session and resets everything.</li>
                  </ul>
                </div>
                <div className="help-section">
                  <h3>Tips</h3>
                  <ul style={{ margin: 0, paddingLeft: '1.2rem', listStyleType: 'disc' }}>
                    <li>If you can't hear anything, check your device isn't in silent mode.</li>
                    <li>Keep the app on screen while practising — audio may stop if you switch away or lock your device.</li>
                    <li>For the best experience on iPhone, use Safari or add Shuffle to your home screen.</li>
                    <li>Tap <strong>☰</strong> to switch to letter mode, share your settings as a link, or reset all settings to defaults.</li>
                  </ul>
                </div>
                <div className="help-section">
                  <h3>Feedback</h3>
                  <p>Found a bug or have a suggestion? <a href="mailto:hello@shuffleclick.com">Get in touch →</a></p>
                </div>
                <div className="help-section help-section-support">
                  <h3>Support Shuffle</h3>
                  <p>Enjoying Shuffle? Help keep it free and growing! ☕{" "}<a href="https://www.buymeacoffee.com/rossfarley" target="_blank" rel="noopener noreferrer">Support here →</a></p>
                </div>
                <button className="help-close-bottom" style={{ display: (!helpNeedsScroll || helpScrolledToEnd) ? 'block' : 'none' }} onClick={() => setShowHelp(false)}>Close</button>
              </div>
              </div>
            </>
          )}

          <div className="display">
            <div className="exercise-label">
              {phase === "countin" ? "count in" : phase === "idle" ? (setComplete ? "\u00A0" : "ready") : mode === MODE_CLICKONLY ? (stopwatch ? "time" : "bar") : "exercise"}
            </div>

            {phase === "countin" ? (
              <div className="countdown-display">
                {countInBeat > 0 ? fmt(((countInBeat - 1) % timeSig.beats) + 1) : "--"}
              </div>
            ) : setComplete ? (
              <div className="exercise-number done">
                done
              </div>
            ) : mode === MODE_CLICKONLY && stopwatch && phase !== "idle" ? (
              <div className="exercise-number stopwatch-time" style={{ letterSpacing: 0 }}>
                {Math.floor(elapsedSeconds / 60)}<span style={{ margin: "0 -0.12em" }}>:</span>{String(elapsedSeconds % 60).padStart(2, "0")}
              </div>
            ) : (
              <div className={`exercise-number${flashOn && !looping ? " flash" : ""}${phase === "idle" ? " idle" : ""}${looping && phase === "playing" ? " looping" : ""}`}>
                {exercise !== null ? (mode === MODE_CLICKONLY ? fmt(exercise) : fmtEx(exercise, letterMode)) : "--"}
              </div>
            )}

            {phase === "idle" ? (
              setComplete ? (
                <div className="idle-summary">&nbsp;</div>
              ) : (
                <div className="idle-summary">
                  {mode === MODE_CLICKONLY
                    ? `${bpm} bpm · ${timeSig.label} · metronome${stopwatch ? " \u23F1\uFE0E" : ""}`
                    : exMode === 'pick'
                      ? `${pickedNums.length === 0 ? 'no bars' : pickedNums.length > 4 ? `${pickedNums.length} exercises` : pickedNums.map(n => letterMode ? numToLetter(n) : String(n)).join(', ')} · ${barsPerExercise} round${barsPerExercise !== 1 ? "s" : ""} · ${modeSummary}`
                      : `${letterMode ? numToLetter(minEx) : String(minEx)}–${letterMode ? numToLetter(maxEx) : String(maxEx)} · ${exerciseLength}-bar ex · ${barsPerExercise} round${barsPerExercise !== 1 ? "s" : ""} · ${modeSummary}`}
                </div>
              )
            ) : mode === MODE_CLICKONLY ? (
              <div className="next-exercise">
                {paused
                  ? <span className="status-label" style={{ color: watchScreen === "app" ? "#f5c842" : undefined }}>paused</span>
                  : isResuming
                    ? <span className="status-label">resuming</span>
                    : "\u00A0"}
              </div>
            ) : (
              <div key={nextEx} className="next-exercise" style={{ opacity: paused ? 1 : isResuming ? 1 : nextEx === -1 ? 1 : looping ? 1 : nextOpacity }}>
                {paused
                  ? <span className="status-label" style={{ color: watchScreen === "app" ? "#f5c842" : undefined }}>paused</span>
                  : isResuming
                    ? <><span className="next-label">resuming</span>{fmtEx(nextEx ?? exercise, letterMode)}</>
                    : looping
                      ? <span className="status-label status-label--dim">looping</span>
                      : nextEx === -1 && phase === "playing"
                        ? <span className="status-label status-label--dim">last exercise</span>
                        : nextEx !== null && (phase === "playing" || phase === "countin")
                          ? <><span className="next-label">up next</span>{fmtEx(nextEx === -1 ? exercise : nextEx, letterMode)}</>
                          : "\u00A0"}
              </div>
            )}

            {!setComplete && (
              <div className="beat-dots">
                {Array.from({ length: timeSig.beats }).map((_, i) => (
                  <div key={i} className={`beat-dot${phase === "idle" ? " inactive" : ""}${i === 0 ? " beat1" : ""}${phase === "playing" && !paused && currentBeat === i ? " active" : ""}`} />
                ))}
              </div>
            )}

            {!setComplete && mode !== MODE_CLICKONLY && (
              <BarProgress
                barsPerExercise={barsPerExercise}
                currentRound={currentRound}
                currentBar={currentBar}
                exerciseLength={exerciseLength}
                looping={looping}
                phase={phase}
                countInBars={countInBars}
                countInBeat={countInBeat}
                beatsPerBar={timeSig.beats}
                barFlash={barFlash}
              />
            )}
            {(!setComplete && mode === MODE_CLICKONLY) && <div style={{ height: "5px" }} />}
            {showMuteHint && phase !== "idle" && watchScreen !== "app" && (
              <div className={`mute-hint${phase !== "countin" ? " fading" : ""}`}>No sound? Check volume and silent mode.</div>
            )}
            {appToastMsg && <div key={appToastKey} className="app-toast">{appToastMsg}</div>}
          </div>

          <div className="controls">

            <div className="section-grid controls-grid">

              <div className={`control-group full-width${watchScreen === "app" ? " watch-locked" : running ? " dimmed" : ""}`}>
                <label>Mode</label>
                <div className="selector-row">
                  {[
                    { label: "Shuffle",   value: MODE_FULLSET },
                    { label: "Sequence",  value: MODE_SEQUENTIAL },
                    { label: "Metronome", value: MODE_CLICKONLY },
                  ].map(m => (
                    <button key={m.value}
                      className={`sel-btn${mode === m.value ? " active" : ""}`}
                      onClick={() => {
                        if (m.value === mode && m.value === MODE_CLICKONLY) {
                          setStopwatch(v => { setStopwatchPref(!v); return !v; });
                        } else if (m.value === mode && (m.value === MODE_FULLSET || m.value === MODE_SEQUENTIAL)) {
                          setInfinite(v => { setInfiniteByMode(prev => ({ ...prev, [mode]: !v })); return !v; });
                        } else {
                          if (mode === MODE_FULLSET || mode === MODE_SEQUENTIAL) {
                            setInfiniteByMode(prev => ({ ...prev, [mode]: infinite }));
                          }
                          if (mode === MODE_CLICKONLY) {
                            setStopwatchPref(stopwatch);
                          }
                          setMode(m.value);
                          setInfinite(m.value === MODE_FULLSET || m.value === MODE_SEQUENTIAL ? infiniteByMode[m.value] : false);
                          setStopwatch(m.value === MODE_CLICKONLY ? stopwatchPref : false);
                        }
                      }} disabled={running}
                      >
                      {m.label}{(m.value === mode ? infinite : infiniteByMode[m.value]) && (m.value === MODE_FULLSET || m.value === MODE_SEQUENTIAL) ? " ∞" : ""}{(m.value === mode ? stopwatch : (m.value === MODE_CLICKONLY ? stopwatchPref : false)) && m.value === MODE_CLICKONLY ? " \u23F1\uFE0E" : ""}
                    </button>
                  ))}
                </div>
              </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : ""}`}>
                <label>BPM</label>
                <div className="bpm-widget">
                  <button className="bpm-btn left" {...bpmDecHandlers}>−</button>
                  <div className={`bpm-tap${tapped ? " tapped" : ""}`}
                    onClick={!running && watchScreen !== "app" ? handleTap : undefined}
                    onMouseDown={e => e.preventDefault()}
                    style={running || watchScreen === "app" ? { cursor: "default", pointerEvents: "none" } : {}}>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "2px" }}>
                      <span>{bpm}</span>
                      {!running && watchScreen !== "app" && <span className="bpm-tap-label">tap to set</span>}
                    </div>
                  </div>
                  <button className="bpm-btn right" {...bpmIncHandlers}>+</button>
                </div>
              </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : running ? " dimmed" : ""}`}>
                <label>Time signature</label>
                <CompactSelector
                  id="timeSig"
                  value={timeSig}
                  options={TIME_SIGS}
                  onChange={setTimeSig}
                  disabled={running}
                  openSelector={openSelector}
                  setOpenSelector={setOpenSelector}
                  getLabel={ts => ts.label}
                />
              </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : running ? " dimmed" : ""}`}>
                <label>Count in</label>
                <CompactSelector
                  id="countIn"
                  value={countInBars}
                  options={[1, 2, 4]}
                  onChange={setCountInBars}
                  disabled={running}
                  openSelector={openSelector}
                  setOpenSelector={setOpenSelector}
                  getLabel={n => n === 1 ? "1 bar" : `${n} bars`}
                  buttonLabel={`${countInBars === 1 ? "1 bar" : `${countInBars} bars`}${countInEvery && mode !== MODE_CLICKONLY ? " ✓" : ""}`}
                  footer={
                    <div className={`check-row${mode === MODE_CLICKONLY ? " disabled" : ""}`} style={{ width: '100%', padding: '0.1rem 0' }}>
                      <input type="checkbox" checked={countInEvery}
                        onChange={e => setCountInEvery(e.target.checked)} disabled={mode === MODE_CLICKONLY}
                        style={{ accentColor: "#ff4500", width: 18, height: 18 }} />
                      <span>Count in every exercise</span>
                    </div>
                  }
                />
              </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : mode === MODE_CLICKONLY || running || exMode === 'pick' ? " dimmed" : ""}`}>
                <label>Exercise length</label>
                <CompactSelector
                  id="exLength"
                  value={exerciseLength}
                  options={[1, 2, 4]}
                  onChange={setExerciseLength}
                  disabled={running || mode === MODE_CLICKONLY || exMode === 'pick'}
                  openSelector={openSelector}
                  setOpenSelector={setOpenSelector}
                  getLabel={n => n === 1 ? "1 bar" : `${n} bars`}
                />
              </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : running || mode === MODE_CLICKONLY ? " dimmed" : ""}`}>
                    <label>Exercises</label>
                    <div className="ex-control-row">
                      {exMode === 'range' ? (
                        <div className="range-row">
                          <input type="text" readOnly value={letterMode ? numToLetter(minEx) : String(minEx)}
                            className={!validRange && exMode === 'range' && !running && mode !== MODE_CLICKONLY ? 'invalid' : undefined}
                            {...minSwipeHandlers}
                            disabled={running || mode === MODE_CLICKONLY} />
                          <span>to</span>
                          <input type="text" readOnly value={letterMode ? numToLetter(maxEx) : String(maxEx)}
                            className={!validRange && exMode === 'range' && !running && mode !== MODE_CLICKONLY ? 'invalid' : undefined}
                            {...maxSwipeHandlers}
                            disabled={running || mode === MODE_CLICKONLY} />
                        </div>
                      ) : (
                        <button
                          className={`pick-trigger-btn${pickedNums.length === 0 ? ' empty' : ''}${pickedNums.length === 0 && !running && mode !== MODE_CLICKONLY ? ' invalid' : ''}`}
                          disabled={running || mode === MODE_CLICKONLY}
                          onClick={() => setPickerOpen(true)}>
                          {pickedNums.length === 0 ? 'Tap to select...' : pickedNums.map(n => letterMode ? numToLetter(n) : String(n)).join(', ')}
                        </button>
                      )}
                      <div className="ex-mode-toggle">
                        <button className={`ex-mode-btn${exMode === 'range' ? ' active' : ''}`}
                          disabled={running || mode === MODE_CLICKONLY}
                          onClick={() => setExMode('range')}>Range</button>
                        <button className={`ex-mode-btn${exMode === 'pick' ? ' active' : ''}`}
                          disabled={running || mode === MODE_CLICKONLY}
                          onClick={() => { setExMode('pick'); setExerciseLength(1); }}>Pick</button>
                      </div>
                    </div>
                  </div>

              <div className={`control-group${watchScreen === "app" ? " watch-locked" : mode === MODE_CLICKONLY || running ? " dimmed" : ""}`}>
                <label>Rounds</label>
                <div className="stepper">
                  <button className="stepper-btn left" disabled={running || mode === MODE_CLICKONLY} {...barsDecHandlers}>−</button>
                  <div className="stepper-val" style={mode === MODE_CLICKONLY || running ? { opacity: 0.25 } : {}}>{barsPerExercise}</div>
                  <button className="stepper-btn right" disabled={running || mode === MODE_CLICKONLY} {...barsIncHandlers}>+</button>
                </div>
              </div>

            </div>

          </div>

          {watchScreen === "app" && (
            <div className="watch-student-status">
              <div className="watch-student-status-item">{bpm} BPM</div>
              <div className="watch-student-status-item">{countInBars}-bar count in</div>
              <div className="watch-student-status-item">
                {exMode === "pick"
                  ? (pickedNums.length === 0 ? "no ex" : pickedNums.length > 4 ? `${pickedNums.length} ex` : `ex ${pickedNums.map(n => letterMode ? numToLetter(n) : String(n)).join(", ")}`)
                  : `ex ${letterMode ? numToLetter(minEx) : String(minEx)}–${letterMode ? numToLetter(maxEx) : String(maxEx)}`}
              </div>
              <div className="watch-student-status-item">{barsPerExercise} round{barsPerExercise !== 1 ? "s" : ""}</div>
              <div className="watch-student-status-item">
                {mode === MODE_FULLSET ? "Shuffle" : mode === MODE_SEQUENTIAL ? "Sequence" : "Metronome"}{infinite ? " ∞" : ""}{mode === MODE_CLICKONLY && stopwatch ? " ⏱︎" : ""}
              </div>
            </div>
          )}
          <div className="btn-row">
            {!running ? (
              <>
                <button className="action-btn" onClick={handleStart} disabled={!validRange}>
                  Start
                </button>
                <div className="vol-wrap">
                  <button className={`vol-label-btn${showVolume ? " active" : ""}`} onClick={() => setShowVolume(v => !v)}>
                    {volIcon}&nbsp;vol
                  </button>
                </div>
              </>
            ) : (
              <>
                <div className="btn-group">
                  <button className={`action-btn${paused ? " pause-active" : " secondary"}`} onClick={handlePause}>
                    {paused ? "Resume" : "Pause"}
                  </button>
                  {mode !== MODE_CLICKONLY && (
                    <button className={`action-btn${looping ? " loop-active" : " secondary"}`} onClick={handleLoop}>
                      Loop
                    </button>
                  )}
                </div>
                <div className="btn-group-stop" style={watchScreen === "app" ? { display: "none" } : {}}>
                  <button className="action-btn stop" onClick={handleStop}>
                    Stop
                  </button>
                </div>
                <div className="vol-wrap">
                  <button className={`vol-label-btn${showVolume ? " active" : ""}`} onClick={() => setShowVolume(v => !v)}>
                    {volIcon}&nbsp;vol
                  </button>
                </div>
              </>
            )}
            {showVolume && (
              <div className="vol-slider-row">
                <span>Volume</span>
                <input type="range" min={0} max={1} step={0.05}
                  value={volume} onChange={e => setVolume(Number(e.target.value))} />
              </div>
            )}
          </div>

          <div className="version-footer">v1.9.8 · rossfarley.uk · © 2026 Ross Farley</div>

          {numpadOpen === 'min' && (
            <NumpadPopup
              label="MIN"
              initialValue={minEx}
              onConfirm={(v) => { setMinEx(v); setNumpadOpen(null); }}
              onClose={() => setNumpadOpen(null)}
              letterMode={letterMode}
            />
          )}
          {numpadOpen === 'max' && (
            <NumpadPopup
              label="MAX"
              initialValue={maxEx}
              onConfirm={(v) => { setMaxEx(v); setNumpadOpen(null); }}
              onClose={() => setNumpadOpen(null)}
              letterMode={letterMode}
            />
          )}
          {pickerOpen && (
            <BarPickerPopup
              pickedNums={pickedNums}
              onConfirm={(nums) => { setPickedNums(nums); setPickerOpen(false); }}
              onClose={() => setPickerOpen(false)}
              letterMode={letterMode}
            />
          )}

          {showLetterModePopup && ReactDOM.createPortal(
            <>
              <div className="numpad-backdrop" onClick={() => setShowLetterModePopup(false)} />
              <div className="letter-mode-popup">
                <div className="letter-mode-popup-title">You've discovered letter mode!</div>
                <div className="letter-mode-popup-body">Exercises will now show as letters A–Z. To switch back to number mode, press and hold the version number at the bottom of the screen.</div>
                <button className="letter-mode-popup-ok" onPointerDown={(e) => e.preventDefault()} onClick={() => setShowLetterModePopup(false)}>Got it</button>
              </div>
            </>,
            document.body
          )}

        </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <p style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Randomise your exercises and keep time with Shuffle — a free tool that helps musicians practise more effectively. Set a range of exercises, choose a BPM, and let Shuffle run your session.</p>
  <script data-goatcounter="https://shuffle.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>

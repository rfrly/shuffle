<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shuffle Watch" />
  <meta name="description" content="Randomise your exercises and keep time with Shuffle — a free tool that helps musicians practise more effectively." />
  <meta property="og:title" content="Shuffle Watch" />
  <meta property="og:description" content="Randomise your exercises and keep time with Shuffle — a free tool that helps musicians practise more effectively." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://shuffleclick.com" />
  <meta property="og:image" content="https://shuffleclick.com/shuffle-icon.png" />
  <title>Shuffle Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <link rel="icon" href="https://shuffleclick.com/watch/shuffle-icon-watch.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --font-mono: 'Share Tech Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      --font-body: 'Barlow', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body, html {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: var(--font-body);
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

.app {
  position: fixed;
  inset: 0;

  background: #0f0f0f;
  color: #e8e8e8;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  padding-left: 1.5rem;
  padding-right: 1.5rem;
  padding-top: max(1rem, env(safe-area-inset-top));
  padding-bottom: 0.5rem;

  gap: 0.75rem;

  user-select: none;
  -webkit-user-select: none;
  overflow: clip;
}

    @media (hover: none) and (pointer: coarse) {
      .browser-mode .app {
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      }
    }

    @media (hover: none) and (pointer: coarse) and (max-width: 767px) {
      .browser-mode .app { gap: 0.4rem; }
      .browser-mode .controls { gap: 0.3rem; }
      .browser-mode .controls-grid { row-gap: 0.6rem; }
      .browser-mode .display { padding: 0.3rem 1rem; }
    }


    @media (max-height: 840px) and (max-width: 767px) {
      .app { gap: 0.4rem; padding-top: max(0.5rem, env(safe-area-inset-top)); }
      .app-header { margin-bottom: 0; }
      .display { padding: 0.6rem 1rem 0.5rem; }
      .section-grid { gap: 0.4rem 1.5rem; }
      .controls { gap: 0.4rem; }
      .btn-row { margin-top: 0.25rem; }
      .version-footer { margin-top: 0.1rem; }
    }

    @media (max-height: 750px) and (max-width: 767px) {
      .app { gap: 0.25rem; }
      .display { padding: 0.4rem 1rem; }
      .section-grid { gap: 0.3rem 1.5rem; }
      .controls { gap: 0.25rem; }
      .section-divider { margin: 0.1rem 0; }
    }


    .app-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 440px;
      margin-bottom: 0.1rem;
    }
    .app-header-row {
      display: flex;
      align-items: center;
      width: 100%;
    }
    .app-header-text { flex: 1; text-align: center; }
    .app-header-spacer { width: 32px; flex-shrink: 0; }

    .app-title {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f5c842;
      text-align: center;
    }

    .app-subtitle {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      text-align: center;
    }

    .display {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      max-width: 440px;
      flex: 1 1 0;
      min-height: 178px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 1rem 1rem 0.75rem;
      position: relative;
    }

    .exercise-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #aaa;
      font-family: var(--font-mono);
      min-height: 1em;
    }

    .exercise-number {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 8rem);
      line-height: 1;
      color: #f5c842;
      font-weight: 700;
      text-shadow: 0 0 30px rgba(245,200,66,0.3);
      transition: color 0.15s, text-shadow 0.15s, transform 0.15s;
      min-width: 3ch;
      text-align: center;
      transform: scale(1);
    }

    .exercise-number.flash {
      color: #ccc;
      text-shadow: 0 0 40px rgba(200,200,200,0.4);
      transform: scale(1.06);
    }

    .exercise-number.idle { color: #444; text-shadow: none; }
    .exercise-number.looping { color: #f5c842; text-shadow: 0 0 30px rgba(245,200,66,0.3); }
    .exercise-number.done {
      color: #4caf7d;
      text-shadow: 0 0 30px rgba(76,175,125,0.3);
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      letter-spacing: 0.1em;
      text-transform: lowercase;
    }

    .next-exercise {
      font-family: var(--font-mono);
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #ccc;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .next-exercise .next-label {
      font-size: 0.6em;
      color: #888;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-right: 0.3em;
    }

    .status-label {
      font-size: 0.6em;
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: "Share Tech Mono", monospace;
    }
    .status-label--dim {
      color: #555;
    }

    .countdown-display {
      font-family: var(--font-mono);
      font-size: clamp(5rem, 18vw, 8rem);
      line-height: 1;
      color: #ff4500;
      text-shadow: 0 0 40px rgba(255,69,0,0.3);
      min-width: 3ch;
      text-align: center;
    }

    .idle-summary {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #777;
      text-align: center;
      padding: 0.4rem 0 0.2rem;
      min-height: 1.2em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .beat-dots {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.3rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 320px;
    }

    .beat-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #555;
      transition: background 0.05s;
    }
    .beat-dot.inactive { background: #555; }
    .beat-dot.active { background: #ff4500; }
    .beat-dot.beat1.active { background: #fff; }

    .bar-progress {
      display: flex;
      gap: 4px;
      margin-top: 0.3rem;
    }

    .bar-block {
      height: 5px;
      background: #555;
      border-radius: 2px;
      transition: background 0.1s;
    }
    .bar-block.done { background: #888; }
    .bar-block.current { background: #f5c842; }
    .bar-block.loop-current { background: #f5c842; opacity: 0.5; }
    .bar-block.countin-done { background: #7a2200; }
    .bar-block.countin-current { background: #ff4500; }

    .bar-progress-continuous {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.3rem;
    }

    .bar-progress-track {
      width: 192px;
      height: 5px;
      background: #555;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bar-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: #f5c842;
      transition: width 0.15s;
    }

    .bar-progress-fill.loop { opacity: 0.5; }

    .bar-progress-counter {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: #555;
      white-space: nowrap;
    }

    .bar-progress-counter.near-end { color: #f5c842; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
      max-width: 440px;
    }

    .section-divider {
      width: 100%;
      height: 1px;
      background: #1e1e1e;
      margin: 0.15rem 0;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.4rem 1.5rem;
    }

    .controls-grid {
      grid-template-columns: repeat(3, 1fr);
      column-gap: 0.75rem;
      row-gap: 1rem;
    }

    @media (max-width: 767px) {
      .controls-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 380px) {
      .sel-btn { font-size: 0.65rem; letter-spacing: 0.02em; }
    }

    .control-group { display: flex; flex-direction: column; gap: 0.3rem; min-width: 0; }
    .control-group.full-width { grid-column: 1 / -1; }

    .control-group label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      font-family: var(--font-mono);
    }

    .control-group.secondary label { color: #888; }
    .control-group.dimmed label { opacity: 0.5; }

    .bpm-widget { display: flex; align-items: center; height: 44px; }

    .bpm-btn {
      width: 44px; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.1s, color 0.1s;
      flex-shrink: 0; font-family: var(--font-mono);
    }
    .bpm-btn:active { background: #2a2a2a; color: #fff; }
    .bpm-btn:disabled { opacity: 0.25; cursor: default; }
    .bpm-btn.left { border-right: none; border-radius: 4px 0 0 4px; }
    .bpm-btn.right { border-left: none; border-radius: 0 4px 4px 0; }

    .bpm-tap {
      flex: 1; height: 44px;
      background: #1a1a1a; border: 1px solid #333;
      color: #f5c842; font-family: var(--font-mono);
      font-size: 1rem; text-align: center; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.08s; min-width: 40px;
    }
    .bpm-tap:active { background: #252525; }
    .bpm-tap.tapped { background: #222; }
    .bpm-tap-label { font-size: 0.5rem; color: #555; letter-spacing: 0.08em; user-select: none; }
    .bpm-tap * { user-select: none; }

    .stepper { display: flex; align-items: center; height: 44px; }

    .stepper-btn {
      width: 44px; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #ccc;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; transition: background 0.1s; flex-shrink: 0;
      font-family: var(--font-mono);
    }
    .stepper-btn:active { background: #2a2a2a; color: #fff; }
    .stepper-btn:disabled { opacity: 0.25; cursor: default; }
    .stepper-btn.left { border-right: none; border-radius: 4px 0 0 4px; }
    .stepper-btn.right { border-left: none; border-radius: 0 4px 4px 0; }

    .stepper-val {
      flex: 1; height: 44px;
      background: #1a1a1a; border: 1px solid #333;
      border-left: none; border-right: none;
      color: #e8e8e8; font-family: var(--font-mono);
      font-size: 1rem; text-align: center;
      display: flex; align-items: center; justify-content: center;
      min-width: 40px;
    }

    .range-row { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .range-row input {
      flex: 1; min-width: 0; height: 44px;
      background: #1a1a1a; border: 1px solid #333; color: #e8e8e8;
      font-family: var(--font-mono); font-size: 1rem;
      padding: 0.4rem 0.5rem; text-align: center; border-radius: 4px;
    }
    .range-row input:focus { outline: none; }
    .range-row input[readonly] { cursor: pointer; }
    .range-row input[readonly]:active { border-color: #f5c842; }
    .range-row input.invalid { border-color: #aa3333; }
    .pick-trigger-btn.invalid { border-color: #aa3333; }
    .range-row input:disabled { opacity: 0.25; cursor: default; }
    .range-row span { font-size: 0.7rem; color: #777; }

    .selector-row { display: flex; gap: 0.4rem; flex-wrap: nowrap; }

    .sel-btn {
      background: #1a1a1a; border: 1px solid #333; color: #bbb;
      font-family: var(--font-mono); font-size: 0.75rem;
      padding: 0 0.65rem; cursor: pointer; transition: all 0.1s;
      letter-spacing: 0.05em; height: 44px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex: 1;
    }
    .sel-btn:active { background: #252525; }
    .sel-btn.active { background: #1e1e1e; border-color: #ff4500; color: #ff4500; }
    .sel-btn:disabled { opacity: 0.25; cursor: default; }

    .check-row { display: flex; align-items: center; gap: 0.5rem; }
    .check-row span {
      font-size: 0.75rem; color: #aaa;
      font-family: var(--font-mono);
    }
    .check-row.disabled { opacity: 0.25; }

    .countin-row {
      display: flex; flex-direction: column; gap: 0.3rem;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 6px; background: #333; border-radius: 3px; outline: none;
      padding: 8px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px; border-radius: 50%;
      background: #f5c842; cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 28px; height: 28px; border-radius: 50%;
      background: #f5c842; cursor: pointer; border: none;
    }

    .vol-wrap { display: flex; align-self: stretch; }

    .vol-label-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: #1e1e1e; border: 1px solid #444; color: #bbb;
      padding: 0 0.75rem; border-radius: 8px;
      cursor: pointer; transition: background 0.1s; flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      width: 100%;
    }
    .vol-label-btn:active { background: #2a2a2a; color: #fff; }
    .vol-label-btn.active { border-color: #f5c842; color: #f5c842; }

    .vol-slider-row {
      display: flex; align-items: center; gap: 0.6rem;
      width: 100%; max-width: 440px;
      position: absolute;
      bottom: 100%;
      left: 0;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.4rem;
      z-index: 10;
    }
    .vol-slider-row span {
      font-family: var(--font-mono);
      font-size: 0.65rem; color: #777;
      letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
    }

    .btn-row {
      display: flex; gap: 0.5rem;
      width: 100%; max-width: 440px;
      margin-top: 1rem;
      position: relative;
    }

    .btn-group { display: flex; gap: 0.5rem; flex: 1; }
    .btn-group-stop { display: flex; }

    .action-btn {
      flex: 1; padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
      border: 1px solid #f5c842; border-radius: 8px;
      background: #f5c842; color: #0f0f0f;
    }
    .action-btn:active { background: #d4aa30; border-color: #d4aa30; }
    .action-btn.secondary { background: #1e1e1e; border-color: #444; color: #bbb; }
    .action-btn.secondary:active { background: #2a2a2a; color: #fff; border-color: #666; }
    .action-btn.pause-active { background: #1e1e1e; border-color: #ccc; color: #ccc; }
    .action-btn.pause-active:active { background: #2a2a2a; border-color: #fff; color: #fff; }
    .action-btn.stop { background: #1e1e1e; border-color: #7a2200; color: #c44; }
    .action-btn.stop:active { background: #2a2a2a; color: #ff4500; border-color: #ff4500; }
    .action-btn.loop-active { border-color: #f5c842; color: #0f0f0f; background: #f5c842; }
    .action-btn.loop-active:active { background: #d4aa30; border-color: #d4aa30; }
    .action-btn:disabled { opacity: 0.3; cursor: default; }

    .error-msg {
      font-size: 0.7rem; color: #ff4500;
      font-family: var(--font-mono); letter-spacing: 0.1em;
    }

    .version-footer {
      font-family: var(--font-mono);
      font-size: 0.5rem;
      color: #444;
      letter-spacing: 0.15em;
      margin-top: auto;
    }

    .rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    .rotate-overlay p {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }
    @media (max-height: 500px) and (max-width: 900px) {
      .rotate-overlay { display: flex; }
    }

    .help-overlay {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(2rem, env(safe-area-inset-top)) 1.5rem max(2rem, env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .help-content {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .help-scroll-fade {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, #0f0f0f);
      pointer-events: none;
      z-index: 101;
      transition: opacity 0.3s;
    }

    .help-close-x {
      align-self: flex-end;
      background: #1e1e1e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #aaa;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.4rem 0.7rem;
      line-height: 1;
    }
    .help-close-x:active { color: #fff; border-color: #888; background: #2a2a2a; }

    .help-close-bottom {
      display: none;
      align-self: center;
      margin-top: 0.5rem;
      background: #1e1e1e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #aaa;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.6rem 1.5rem;
      position: relative;
      z-index: 102;
    }
    .help-close-bottom:active { color: #fff; border-color: #888; background: #2a2a2a; }


    @media (hover: none) and (pointer: coarse) and (min-width: 768px) {
      .help-content { max-width: 640px !important; gap: 1.25rem !important; }
      .help-title { font-size: 1.1rem !important; }
      .help-section h3 { font-size: 1rem !important; }
      .help-section p { font-size: 1.05rem !important; line-height: 1.7 !important; }
      .help-section ul { font-size: 1.05rem !important; line-height: 1.7 !important; }

    }

    .help-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f5c842;
    }

    .help-section { display: flex; flex-direction: column; gap: 0.3rem; }

    .help-section h3 {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff4500;
      font-weight: 400;
    }

    .help-section p {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      letter-spacing: 0.03em;
    }

    .help-section ul {

    /* ── CompactSelector ──────────────────────────────────────────────────── */

    /* ── Numpad popup ─────────────────────────────────────────────────────────── */

    /* watch 1.12: enhanced student glanceable view */

      text-align: center; font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.1em;
      color: #f5c842; pointer-events: none;
      animation: obsToastFade 1.8s ease forwards;
    }
    @keyframes obsToastFade {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @media (hover: none) and (pointer: coarse) and (min-width: 768px) and (min-height: 700px) {
      .watching-banner { max-width: 700px; }
      .observer-info-strip { max-width: 700px; }
      .observer-app .display { max-width: 700px; }

    /* Observer display layout */
    .observer-app .display { min-height: clamp(178px, 30dvh, 320px); }
    .observer-app .display { max-width: 440px; }
    .observer-app .bpm-tap { user-select: none; }
    .observer-app .bpm-tap * { user-select: none; }
    .observer-app .btn-row { width: 100%; max-width: 440px; }
    /* Observer controls panel */

    @media (hover: hover) and (min-width: 1440px) {

      .observer-app .btn-row { max-width: 700px; }
      .observer-controls  { max-width: 700px; }
      .observer-divider   { max-width: 700px; }
    }

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Firebase (watch feature) ───────────────────────────────────────────────
    let _db;
    try {
      const _app = firebase.initializeApp({
        apiKey: "AIzaSyD8efbcrvPm3rBt0NGU3RFhhTRyUTFrB_s",
        authDomain: "shuffle-watch-d578b.firebaseapp.com",
        projectId: "shuffle-watch-d578b",
        storageBucket: "shuffle-watch-d578b.firebasestorage.app",
        messagingSenderId: "173594856788",
        appId: "1:173594856788:web:c96078f9d9df5d41e24cc1",
        databaseURL: "https://shuffle-watch-d578b-default-rtdb.europe-west1.firebasedatabase.app",
      });
      _db = firebase.database(_app);
    } catch(e) { _db = firebase.database(); }

    const WATCH_WORDS = [
      "ARCH","BALE","BARK","BELL","BIRD","BLADE","BLOOM","BOAT","BOG","BOLT",
      "BONE","BOOK","BOOT","BOWL","BOW","BRICK","BRIDGE","BRUSH","BUD","BURR",
      "CAKE","CAMP","CARD","CART","CASK","CAVE","CHIN","CHIP","CLAW","CLAY",
      "CLIFF","CLIP","CLOCK","CLOUD","CLUB","COAL","COAT","COIN","CORK","CORN",
      "CRAB","CREST","CROP","CROWN","DELL","DRUM","DUCK","DUNE","DUSK","DUST",
      "FERN","FISH","FLAX","FLAG","FLAME","FLASK","FLINT","FLOCK","FLOOR","FOAM",
      "FOLD","FONT","FORD","FORK","FROG","FROST","GATE","GIFT","GLEN","GLOVE",
      "GLOW","GOLD","GORGE","GRAIN","GRAPE","GRASS","GRID","GROVE","GUST","HAND",
      "HARP","HAWK","HELM","HILL","HIVE","HOOD","HOOK","HORN","HULL","HUSK",
      "IRON","JADE","KITE","KNOT","LAMP","LARK","LEAF","LEDGE","LIME","LINK",
      "LION","LOCK","LOFT","LOOM","LUTE","MARSH","MAST","MILL","MINT","MIST",
      "MOAT","MOON","MOOR","MOSS","MOTH","MOUNT","NAIL","NEST","NOTE","OAK",
      "OAR","ORB","PAIL","PALM","PATH","PEAK","PERCH","PINE","PIPE","PLANK",
      "PLUM","POND","POOL","PORT","QUILL","REED","REEF","RIDGE","RING","RIND",
      "ROAD","ROCK","ROOF","ROOT","ROPE","ROSE","RUNE","RUST","SAGE","SAIL",
      "SALT","SAND","SEED","SHARD","SHELL","SHIP","SILK","SILT","SLATE","SLOPE",
      "SNOW","SOIL","SPAN","SPARK","SPIRE","SPRIG","STAFF","STAG","STAR","STEM",
      "STEP","STIR","STONE","STORM","STREAM","STUMP","SURF","SWAN","THORN","TIDE",
      "TILE","TOAD","TORCH","TOWER","TRAIL","TREE","TURF","TWIG","VALE","VAULT",
      "VINE","WAVE","WELD","WELL","WHEAT","WICK","WIND","WING","WISP","WIRE",
      "WOLF","WOOD","WOOL","WREN","YARD","YOKE",
    ];
    function generateWatchCode() {
      const pick = () => WATCH_WORDS[Math.floor(Math.random() * WATCH_WORDS.length)];
      let a = pick(), b = pick();
      while (b === a) b = pick();
      return a + "-" + b;
    }

    // ── Observer display component ─────────────────────────────────────────────
    function ObserverDisplay({ state, code, onDisconnect, onSendCmd }) {
      const {
        running: obsRunning, paused: obsPaused, resuming: obsResuming, phase, setComplete: sc,
        currentBeat, currentBar, exercise, nextEx, countInBeat,
        mode: obsMode, infinite: obsInfinite, stopwatch: obsStopwatch, elapsedSeconds: obsElapsed, bpm: obsBpm, timeSig: obsTimeSigLabel,
        barsPerExercise: obsBpe, exerciseLength: obsExLen,
        countInBars: obsCib, countInEvery: obsCountInEvery,
        looping: obsLooping, letterMode: obsLm,
        minEx: obsMinEx, maxEx: obsMaxEx,
        pickedNums: obsPickedNums, exMode: obsExMode,
        disconnected,
      } = state || {};

      const [openSelector, setOpenSelector] = React.useState(null);
      const [pickerOpen, setPickerOpen] = React.useState(false);
      const [numpadOpen, setNumpadOpen] = React.useState(null);
      const tapTimesObs = React.useRef([]);
      const [tapped, setTapped] = React.useState(false);
      const [letterModeOverride, setLetterModeOverride] = React.useState(null);
      const effectiveLm = letterModeOverride !== null ? letterModeOverride : !!obsLm;
      const [toastMsg, setToastMsg] = React.useState(null);
      const [toastKey, setToastKey] = React.useState(0);
      const toastTimer = React.useRef(null);
      const [menuOpen, setMenuOpen] = React.useState(false);
      const showToast = (msg) => {
        setToastMsg(msg);
        setToastKey(k => k + 1);
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToastMsg(null), 1800);
      };

      const obsBpmRef = React.useRef(obsBpm);
      React.useEffect(() => { obsBpmRef.current = obsBpm; }, [obsBpm]);
      const incObsBpm = React.useCallback(() => {
        if (disabled) return;
        onSendCmd({ bpm: Math.min(300, (obsBpmRef.current || 80) + 1) });
      }, [disabled, onSendCmd]);
      const decObsBpm = React.useCallback(() => {
        if (disabled) return;
        onSendCmd({ bpm: Math.max(30, (obsBpmRef.current || 80) - 1) });
      }, [disabled, onSendCmd]);
      const bpmObsIncHandlers = useLongPress(incObsBpm);
      const bpmObsDecHandlers = useLongPress(decObsBpm);

      const beatsPerBar = parseInt(obsTimeSigLabel) || 4;
      const exLen = obsExLen || 1;
      const bpe = obsBpe || 4;
      const currentRound = Math.floor((currentBar || 0) / exLen) + 1;
      const isCountIn = phase === "countin";
      const isPlaying = phase === "playing";
      const isIdle = !obsRunning && !obsPaused;
      const disabled = !!disconnected;
      const obsTimeSig = TIME_SIGS.find(t => t.label === obsTimeSigLabel) || TIME_SIGS[2];
      const exMode = obsExMode || "range";
      const pickedNums = obsPickedNums || [];
      const validRange = obsMode === "clickonly" ? true
        : exMode === "pick" ? pickedNums.length >= 1
        : (obsMinEx || 1) <= (obsMaxEx || 1);

      const modeLabel = ({ fullset: "Shuffle", sequential: "Sequence", clickonly: "Metronome" }[obsMode] || obsMode) + (obsInfinite && obsMode !== "clickonly" ? " ∞" : "");

      const buildSettingsSummary = () => {
        let parts = [modeLabel];
        if (obsMode !== "clickonly") {
          if (exMode === "pick") {
            if (pickedNums.length === 0) parts.push("no exercises");
            else parts.push(...pickedNums.map(n => effectiveLm ? numToLetter(n) : String(n)));
          } else {
            const lo = effectiveLm ? numToLetter(obsMinEx || 1) : String(obsMinEx || 1);
            const hi = effectiveLm ? numToLetter(obsMaxEx || 1) : String(obsMaxEx || 1);
            parts.push(`${lo}\u2013${hi}`);
          }
          const rds = obsBpe || 1;
          parts.push(`${rds} round${rds !== 1 ? "s" : ""}`);
        }
        const cib = obsCib || 1;
        parts.push(`${cib}-bar count in${obsCountInEvery && obsMode !== "clickonly" ? " every exercise" : ""}`);
        return parts.join(", ");
      };

      const buildShareUrl = () => {
        const p = new URLSearchParams();
        if (obsBpm)           p.set("bpm",    String(obsBpm));
        if (obsTimeSigLabel)  p.set("sig",    obsTimeSigLabel);
        if (obsExLen)         p.set("exlen",  String(obsExLen));
        if (obsMinEx != null) p.set("min",    String(obsMinEx));
        if (obsMaxEx != null) p.set("max",    String(obsMaxEx));
        if (obsCib)           p.set("cib",    String(obsCib));
        if (obsCountInEvery)  p.set("cie",    "1");
        if (obsMode)          p.set("mode",   obsMode);
        if (obsInfinite && obsMode !== "clickonly") p.set("inf", "1");
        if (obsBpe)           p.set("rounds", String(obsBpe));
        if (obsExMode && obsExMode !== "range") p.set("exmode", obsExMode);
        if (obsExMode === "pick" && pickedNums.length > 0) p.set("picks", pickedNums.join(","));
        if (effectiveLm)      p.set("lm",     "1");
        return "https://shuffleclick.com/?" + p.toString();
      };

      const handleTapBpm = () => {
        if (disabled || obsRunning) return;
        const now = Date.now();
        tapTimesObs.current = [...tapTimesObs.current.filter(t => now - t < 3000), now];
        if (tapTimesObs.current.length >= 2) {
          const intervals = tapTimesObs.current.slice(1).map((t, i) => t - tapTimesObs.current[i]);
          const avg = intervals.reduce((a, b) => a + b, 0) / intervals.length;
          const newBpm = Math.round(60000 / avg);
          if (newBpm >= 30 && newBpm <= 300) onSendCmd({ bpm: newBpm });
        }
        setTapped(true);
        setTimeout(() => setTapped(false), 100);
      };

      return (
        <div className="observer-app">
          <div className="watching-banner">
            <div className="watching-banner-right">
              <span className="watching-code-text">watching <span>{code}</span></span>
              <button className="watching-disconnect-btn" onClick={() => { onSendCmd({ tcmd: "end-session", tseq: Date.now() }); onDisconnect(); }}>stop</button>
            </div>
            <button className={`obs-menu-btn${menuOpen ? " open" : ""}`}
              onClick={() => setMenuOpen(v => !v)}>☰</button>
            {menuOpen && (
              <>
                <div style={{ position: "fixed", inset: 0, zIndex: 49 }}
                     onClick={() => setMenuOpen(false)} />
                <div className="obs-menu-panel">
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false);
                    navigator.clipboard.writeText(buildSettingsSummary())
                      .then(() => showToast("Copied!"))
                      .catch(() => showToast("Copy failed"));
                  }}>Copy summary</button>
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false);
                    const next = !effectiveLm;
                    setLetterModeOverride(next);
                    onSendCmd({ letterMode: next });
                    showToast(next ? "Letter mode on" : "Letter mode off");
                  }}>{effectiveLm ? "Turn letter mode off" : "Turn letter mode on"}</button>
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false);
                    navigator.clipboard.writeText(buildShareUrl())
                      .then(() => showToast("Link copied!"))
                      .catch(() => showToast("Copy failed"));
                  }}>Share link</button>
                  <button className="obs-menu-item" onClick={() => {
                    setMenuOpen(false);
                    onSendCmd({ tcmd: "stop", tseq: Date.now(),
                      bpm: 80, timeSig: "4/4", barsPerExercise: 4, exerciseLength: 1,
                      minEx: 1, maxEx: 4, countInBars: 1, countInEvery: true,
                      mode: "fullset", infinite: false, stopwatch: false, exMode: "range", pickedNums: [], letterMode: false });
                    setLetterModeOverride(false);
                    showToast("Settings reset");
                  }}>Reset to defaults</button>
                </div>
              </>
            )}
          </div>

          {disconnected && <div className="observer-offline">Session ended</div>}

          <div className="display">
            <div className="exercise-label">
              {isCountIn ? "count in" : sc ? "\u00A0" : isIdle ? "ready" : obsMode === "clickonly" ? "bar" : "exercise"}
            </div>

            {isCountIn ? (
              <div className="countdown-display">
                {countInBeat > 0 ? (((countInBeat - 1) % beatsPerBar) + 1 < 10 ? "0" : "") + (((countInBeat - 1) % beatsPerBar) + 1) : "--"}
              </div>
            ) : sc ? (
              <div className="exercise-number done">done</div>
            ) : obsMode === "clickonly" && obsStopwatch && phase !== "idle" ? (
              <div className="exercise-number stopwatch-time" style={{ letterSpacing: 0 }}>
                {Math.floor((obsElapsed || 0) / 60)}<span style={{ margin: "0 -0.12em" }}>:</span>{String((obsElapsed || 0) % 60).padStart(2, "0")}
              </div>
            ) : (
              <div className={`exercise-number${isIdle ? " idle" : ""}`}>
                {exercise != null ? (effectiveLm ? String.fromCharCode(64 + exercise) : (exercise < 10 ? "0" + exercise : "" + exercise)) : "--"}
              </div>
            )}

            {!sc && (
              isIdle ? (
                <div className="idle-summary" style={{ userSelect: "none", WebkitUserSelect: "none" }}
                >
                  {obsMode === "clickonly"
                    ? `${obsBpm || "--"} bpm · ${obsTimeSigLabel || "--"} · metronome`
                    : exMode === "pick"
                      ? `${pickedNums.length === 0 ? "no bars" : pickedNums.length > 4 ? `${pickedNums.length} exercises` : pickedNums.map(n => effectiveLm ? numToLetter(n) : String(n)).join(", ")} · ${obsBpe || "--"} round${obsBpe !== 1 ? "s" : ""} · ${(obsMode === "fullset" ? "shuffle" : obsMode === "sequential" ? "sequence" : obsMode || "--") + (obsInfinite && obsMode !== "clickonly" ? " ∞" : "")}`
                      : `${effectiveLm ? numToLetter(obsMinEx || 1) : String(obsMinEx || 1)}–${effectiveLm ? numToLetter(obsMaxEx || 1) : String(obsMaxEx || 1)} · ${obsExLen || "--"}-bar ex · ${obsBpe || "--"} round${obsBpe !== 1 ? "s" : ""} · ${(obsMode === "fullset" ? "shuffle" : obsMode === "sequential" ? "sequence" : obsMode || "--") + (obsInfinite && obsMode !== "clickonly" ? " ∞" : "")}`}
                </div>
              ) : (
                <div className="next-exercise">
                  {obsPaused
                    ? <span className="status-label">paused</span>
                    : obsResuming
                      ? obsMode === "clickonly"
                        ? <span className="status-label">resuming</span>
                        : <><span className="next-label">resuming</span>{exercise != null ? (effectiveLm ? String.fromCharCode(64 + exercise) : (exercise < 10 ? "0" + exercise : "" + exercise)) : "--"}</>
                      : obsLooping
                        ? <span className="status-label status-label--dim">looping</span>
                        : nextEx === -1 && phase === "playing"
                          ? <span className="status-label status-label--dim">last exercise</span>
                          : nextEx != null && (phase === "playing" || phase === "countin")
                            ? <><span className="next-label">up next</span>{effectiveLm ? String.fromCharCode(64 + (nextEx === -1 ? exercise : nextEx)) : ((nextEx === -1 ? exercise : nextEx) < 10 ? "0" + (nextEx === -1 ? exercise : nextEx) : "" + (nextEx === -1 ? exercise : nextEx))}</>
                            : "\u00A0"}
                </div>
              )
            )}

            {!sc && (
              <div className="beat-dots">
                {Array.from({ length: beatsPerBar }).map((_, i) => (
                  <div key={i} className={`beat-dot${isIdle ? " inactive" : ""}${i === 0 ? " beat1" : ""}${isPlaying && !obsPaused && (currentBeat || 0) === i ? " active" : ""}`} />
                ))}
              </div>
            )}

            {!sc && obsMode !== "clickonly" && (
              <BarProgress
                barsPerExercise={bpe}
                currentRound={currentRound}
                currentBar={currentBar || 0}
                exerciseLength={exLen}
                looping={obsLooping}
                phase={phase || "idle"}
                countInBars={obsCib || 1}
                countInBeat={countInBeat || 0}
                beatsPerBar={beatsPerBar}
                barFlash={false}
              />
            )}
            {toastMsg && <div key={toastKey} className="obs-toast">{toastMsg}</div>}
          </div>


          <div className="observer-controls">
            <div className="section-grid controls-grid">

              <div className={`control-group full-width${obsRunning ? " dimmed" : ""}`}>
                <label>Mode</label>
                <div className="selector-row">
                  {[
                    { label: "Shuffle",   value: "fullset" },
                    { label: "Sequence",  value: "sequential" },
                    { label: "Metronome", value: "clickonly" },
                  ].map(m => (
                    <button key={m.value}
                      className={`sel-btn${obsMode === m.value ? " active" : ""}`}
                      onClick={() => {
                        if (m.value === obsMode && m.value === "clickonly") {
                          onSendCmd({ stopwatch: !obsStopwatch });
                        } else if (m.value === obsMode && (m.value === "fullset" || m.value === "sequential")) {
                          onSendCmd({ infinite: !obsInfinite });
                        } else {
                          onSendCmd({ mode: m.value });
                        }
                      }} disabled={disabled || obsRunning}>
                      {m.label}{obsMode === m.value && obsInfinite ? " ∞" : ""}{obsMode === m.value && m.value === "clickonly" && obsStopwatch ? " \u23F1\uFE0E" : ""}
                    </button>
                  ))}
                </div>
              </div>

              <div className="control-group">
                <label>BPM</label>
                <div className="bpm-widget">
                  <button className="bpm-btn left" disabled={disabled} {...bpmObsDecHandlers}>−</button>

                    <button className={"ex-mode-btn" + (exMode === "pick" ? " active" : "")}

                    onClick={() => onSendCmd({ barsPerExercise: Math.min(32, (obsBpe || 4) + 1) })}>+</button>

          <div className="btn-row" style={{ width: "100%" }}>
            {!obsRunning ? (
              <button className="action-btn" disabled={disabled || !validRange}
                onClick={() => onSendCmd({ tcmd: "start", tseq: Date.now() })}>Start</button>
            ) : (
              <>
                <div className="btn-group">
                  <button className={`action-btn${obsPaused ? " pause-active" : " secondary"}`} disabled={disabled}
                    onClick={() => onSendCmd({ tcmd: obsPaused ? "resume" : "pause", tseq: Date.now() })}>
                    {obsPaused ? "Resume" : "Pause"}
                  </button>
                  {obsMode !== "clickonly" && (
                    <button className={`action-btn${obsLooping ? " loop-active" : " secondary"}`} disabled={disabled}
                      onClick={() => onSendCmd({ tcmd: "loop", tseq: Date.now() })}>Loop</button>

          {numpadOpen === "min" && (
            <NumpadPopup label="Min exercise" initialValue={obsMinEx || 1}
              onConfirm={v => { setNumpadOpen(null); onSendCmd({ minEx: v }); }}
              onClose={() => setNumpadOpen(null)} letterMode={effectiveLm} />
          )}
          {numpadOpen === "max" && (
            <NumpadPopup label="Max exercise" initialValue={obsMaxEx || 1}
              onConfirm={v => { setNumpadOpen(null); onSendCmd({ maxEx: v }); }}
              onClose={() => setNumpadOpen(null)} letterMode={effectiveLm} />
          )}
          {pickerOpen && (
            <BarPickerPopup
              pickedNums={pickedNums}
              onConfirm={nums => { setPickerOpen(false); onSendCmd({ pickedNums: nums, exMode: "pick" }); }}
              onClose={() => setPickerOpen(false)}
              letterMode={effectiveLm} />
          )}
        </div>
      );
    }


    const TIME_SIGS = [
      { label: "2/4", beats: 2 },
      { label: "3/4", beats: 3 },
      { label: "4/4", beats: 4 },
      { label: "5/4", beats: 5 },
      { label: "6/4", beats: 6 },
      { label: "7/4", beats: 7 },
    ];

    const MODE_FULLSET    = "fullset";
    const MODE_SEQUENTIAL = "sequential";
    const MODE_CLICKONLY  = "clickonly";

    const STORAGE_KEY = "shuffle_settings_v7";

    // ── Constants ─────────────────────────────────────────────────────────────

    const SCHEDULER_INTERVAL_MS   = 25;
    const LOOKAHEAD_TIME          = 0.2;
    const START_DELAY             = 0.1;
    const FLASH_DURATION_MS       = 200;
    const SET_COMPLETE_DISPLAY_MS = 2000;
    const RESUME_SETUP_DELAY_MS   = 50;
    const BPM_MIN                 = 30;
    const BPM_MAX                 = 300;
    const BARS_MIN                = 1;
    const BARS_MAX                = 32;
    const EX_MIN                  = 1;
    const EX_MAX                  = 200;
    const EX_MAX_LETTERS          = 26;
    const TAP_MAX_HISTORY         = 8;
    const TAP_RESET_MS            = 2000;
    const BAR_BLOCKS_MAX          = 16;  // above this threshold, use progress bar

    function loadSettings() {
      try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; }
      catch { return null; }
    }
    function saveSettings(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }
    function loadUrlParams() {
      try {
        const p = new URLSearchParams(window.location.search);
        if (!p.toString()) return null;
        const r = {};
        if (p.has("bpm"))    { const v = parseInt(p.get("bpm"));    if (v >= 30 && v <= 300) r.bpm = v; }
        if (p.has("sig"))    { const v = p.get("sig");               if (TIME_SIGS.some(t => t.label === v)) r.timeSig = v; }
        if (p.has("exlen"))  { const v = parseInt(p.get("exlen"));   if ([1,2,4].includes(v)) r.exerciseLength = v; }
        if (p.has("min"))    { const v = parseInt(p.get("min"));     if (v >= 1 && v <= 200) r.minEx = v; }
        if (p.has("max"))    { const v = parseInt(p.get("max"));     if (v >= 1 && v <= 200) r.maxEx = v; }
        if (p.has("cib"))    { const v = parseInt(p.get("cib"));     if ([1,2,4].includes(v)) r.countInBars = v; }
        if (p.has("cie"))    r.countInEvery = p.get("cie") === "1";
        if (p.has("mode"))   { const v = p.get("mode"); if (["fullset","sequential","clickonly"].includes(v)) r.mode = v; }
        if (p.has("inf"))    r.infinite = p.get("inf") === "1";
        if (p.has("rounds")) { const v = parseInt(p.get("rounds"));  if (v >= 1 && v <= 32) r.barsPerExercise = v; }
        if (p.has("exmode")) { const v = p.get("exmode"); if (["range","pick"].includes(v)) r.exMode = v; }
        if (p.has("picks"))  { const nums = p.get("picks").split(",").map(Number).filter(n => n >= 1 && n <= 200); if (nums.length > 0) { r.pickedNums = nums; r.exMode = "pick"; } }
        if (p.has("lm"))     r.letterMode = p.get("lm") === "1";
        if (p.has("sw"))     r.stopwatch  = p.get("sw")  === "1";
        return Object.keys(r).length > 0 ? r : null;
      } catch { return null; }
    }

    // ── Audio ──────────────────────────────────────────────────────────────────

    function getCompressor(ctx) {
      if (ctx._compressor) return ctx._compressor;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -12;
      comp.knee.value       =   6;
      comp.ratio.value      =   4;
      comp.attack.value     = 0.003;
      comp.release.value    = 0.15;
      comp.connect(ctx.destination);
      ctx._compressor = comp;
      return comp;
    }

    function scheduleWoodblock(ctx, time, isDownbeat, vol) {
      const bufSize = Math.floor(ctx.sampleRate * 0.05);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++)
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 10);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = isDownbeat ? 2000 : 1400;
      filter.Q.value = 4;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime((isDownbeat ? 2.8 : 2.0) * vol, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
      src.connect(filter); filter.connect(gain); gain.connect(getCompressor(ctx));
      src.start(time); src.stop(time + 0.06);
    }

    function scheduleEndBell(ctx, time, vol) {
      const bufSize = Math.floor(ctx.sampleRate * 0.06);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++)
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 8);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 2800;
      filter.Q.value = 5;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(vol * 1.4, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      src.connect(filter); filter.connect(gain); gain.connect(getCompressor(ctx));
      src.start(time); src.stop(time + 0.09);
    }

    function scheduleMetronomeClick(ctx, time, isDownbeat, vol) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(getCompressor(ctx));
      osc.frequency.value = isDownbeat ? 1000 : 700;
      gain.gain.setValueAtTime((isDownbeat ? 0.9 : 0.5) * vol, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      osc.start(time); osc.stop(time + 0.09);
    }

    function startSilentLoop(ctx) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const gain = ctx.createGain();
      gain.gain.value = 0.001;
      src.connect(gain); gain.connect(getCompressor(ctx));
      src.start();
      return src;
    }

    // ── Timer hook ─────────────────────────────────────────────────────────────

    function useDrumTimer({ bpm, beatsPerBar, barsPerExercise, minEx, maxEx,
                            onNewExercise, onNextExercise, onSetComplete,
                            running, paused, resuming,
                            countInBars, countInEveryRound,
                            mode, volume, looping, infinite, setComplete,
                            exMode, pickedNums, keepCtxAlive }) {

      const audioCtx          = useRef(null);
      const silentLoop        = useRef(null);
      const nextBeatTime      = useRef(0);
      const beatCount         = useRef(0);
      const schedulerRef      = useRef(null);
      const lastExercise      = useRef(null);
      const nextExercise      = useRef(null);
      const deckRef           = useRef([]);
      const seqIndex          = useRef(0);
      const exercisesPlayed   = useRef(0);
      const loopingRef        = useRef(looping);
      const infiniteRef       = useRef(infinite);
      const countInProgress   = useRef(false);
      const countInBeatPos    = useRef(0);
      const playBeatCount     = useRef(0);
      const schedulerFn       = useRef(null);
      const setEndPending     = useRef(false);
      const stoppedRef        = useRef(false);
      const wasRunningRef     = useRef(false);

      const [currentBeat,  setCurrentBeat]  = useState(0);
      const [currentBar,   setCurrentBar]   = useState(0);
      const [phase,        setPhase]        = useState("idle");
      const [flashOn,      setFlashOn]      = useState(false);
      const [countInBeat,  setCountInBeat]  = useState(0);
      const [isResuming,   setIsResuming]   = useState(false);

      const getCtx = useCallback(() => {
        if (!audioCtx.current)
          audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx.current;
      }, []);

      const buildDeck = useCallback((min, max, avoidFirst) => {
        const arr = [];
        for (let i = min; i <= max; i++) arr.push(i);
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        if (avoidFirst != null && arr.length > 1 && arr[0] === avoidFirst) {
          const swap = Math.floor(Math.random() * (arr.length - 1)) + 1;
          [arr[0], arr[swap]] = [arr[swap], arr[0]];
        }
        return arr;
      }, []);

      const buildDeckFromArray = useCallback((arr, avoidFirst) => {
        const deck = [...arr];
        for (let i = deck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        if (avoidFirst != null && deck.length > 1 && deck[0] === avoidFirst) {
          const swap = Math.floor(Math.random() * (deck.length - 1)) + 1;
          [deck[0], deck[swap]] = [deck[swap], deck[0]];
        }
        return deck;
      }, []);

      const pickNext = useCallback((min, max, last, currentMode) => {
        const { exMode: em, pickedNums: pn } = stateRef.current;
        if (em === 'pick' && pn && pn.length > 0) {
          if (currentMode === MODE_FULLSET) {
            if (deckRef.current.length === 0) deckRef.current = buildDeckFromArray(pn, last);
            return deckRef.current.shift();
          } else {
            const ex = pn[seqIndex.current % pn.length];
            seqIndex.current++;
            return ex;
          }
        }
        if (currentMode === MODE_FULLSET) {
          if (deckRef.current.length === 0) deckRef.current = buildDeck(min, max, last);
          return deckRef.current.shift();
        } else {
          const total = max - min + 1;
          const ex = min + (seqIndex.current % total);
          seqIndex.current++;
          return ex;
        }
      }, [buildDeck, buildDeckFromArray]);

      const stateRef = useRef({});
      useEffect(() => {
        stateRef.current = { bpm, beatsPerBar, barsPerExercise, minEx, maxEx,
                             onNewExercise, onNextExercise, onSetComplete,
                             countInBars, countInEveryRound,
                             mode, volume, exMode, pickedNums };
      });

      const resumingRef = useRef(false);

      useEffect(() => {
        infiniteRef.current = infinite;
      }, [infinite]);

      useEffect(() => {
        loopingRef.current = looping;
        if (!looping && lastExercise.current !== null) {
          const { onNextExercise: onNext } = stateRef.current;
          if (setEndPending.current) {
            onNext(-1);
          } else if (nextExercise.current !== null) {
            onNext(nextExercise.current);
          }
        }
      }, [looping]);

      useEffect(() => {
        if (!audioCtx.current) return;
        const ctx = audioCtx.current;
        if (paused) {
          clearInterval(schedulerRef.current);
        } else if (resuming) {
          resumingRef.current = true;
          beatCount.current = 0;
          playBeatCount.current = 0;
          countInProgress.current = false;
          countInBeatPos.current = 0;
          nextBeatTime.current = Infinity;
          setIsResuming(true);
          setPhase("countin");
          const { onNextExercise: onNext } = stateRef.current;
          onNext(lastExercise.current);
          setTimeout(() => {
            nextBeatTime.current = ctx.currentTime + START_DELAY;
            clearInterval(schedulerRef.current);
            if (schedulerFn.current) {
              schedulerRef.current = setInterval(schedulerFn.current, SCHEDULER_INTERVAL_MS);
            }
          }, RESUME_SETUP_DELAY_MS);
        } else {
          ctx.resume().catch(() => {});
        }
      }, [paused, resuming]);

      // ── Reset on stop ──
      useEffect(() => {
        if (!running) {
          if (wasRunningRef.current) stoppedRef.current = true;
          clearInterval(schedulerRef.current);
          if (silentLoop.current) { try { silentLoop.current.stop(); } catch {} silentLoop.current = null; }
          if (!keepCtxAlive) {
            if (setComplete) {
              setTimeout(() => {
                if (audioCtx.current) { try { audioCtx.current.close(); } catch {} audioCtx.current = null; }
              }, 150);
            } else {
              if (audioCtx.current) { try { audioCtx.current.close(); } catch {} audioCtx.current = null; }
            }
          }
          setPhase("idle");
          setCurrentBeat(0); setCurrentBar(0); setCountInBeat(0); setIsResuming(false);
          beatCount.current = 0; playBeatCount.current = 0; exercisesPlayed.current = 0;
          lastExercise.current = null; nextExercise.current = null;
          deckRef.current = []; seqIndex.current = 0;
          countInProgress.current = false; countInBeatPos.current = 0;
          resumingRef.current = false; schedulerFn.current = null; setEndPending.current = false;
          nextBeatTime.current = 0;
          wasRunningRef.current = false;
        }
      }, [running, setComplete]);

      // ── Fresh start only ──
      useEffect(() => {
        if (!running || paused || resuming || schedulerFn.current) return;

        const ctx = getCtx();
        if (ctx.state === "suspended") ctx.resume();
        if (!silentLoop.current) silentLoop.current = startSilentLoop(ctx);

        const { countInBars: cib, minEx: mn, maxEx: mx,
                onNewExercise: cb, onNextExercise: cbNext, mode: m } = stateRef.current;

        beatCount.current = 0; playBeatCount.current = 0;
        nextBeatTime.current = ctx.currentTime + START_DELAY;
        countInProgress.current = false; countInBeatPos.current = 0;
        resumingRef.current = false; stoppedRef.current = false;
        wasRunningRef.current = true;

        exercisesPlayed.current = 1;
        deckRef.current = []; seqIndex.current = 0;
        setPhase("countin");

        if (m === MODE_CLICKONLY) {
          lastExercise.current = 1;
          nextExercise.current = null;
          cb(1);
          cbNext(null);
        } else {
          const firstEx = pickNext(mn, mx, null, m);
          lastExercise.current = firstEx;

          const { exMode: emStart, pickedNums: pnStart } = stateRef.current;
          const totalInSetAtStart = (emStart === 'pick' && pnStart && pnStart.length > 0) ? pnStart.length : mx - mn + 1;
          if ((m === MODE_FULLSET || m === MODE_SEQUENTIAL) && totalInSetAtStart === 1) {
            nextExercise.current = firstEx;
            setEndPending.current = true;
            cbNext(firstEx);
          } else {
            const secondEx = pickNext(mn, mx, firstEx, m);
            nextExercise.current = secondEx;
            cbNext(firstEx);
          }
        }

        const scheduler = () => {
          const { bpm: b, beatsPerBar: bpb2, barsPerExercise: bpe,
                  minEx: min, maxEx: max,
                  onNewExercise: onChange, onNextExercise: onNext,
                  onSetComplete: onDone,
                  countInBars: cib2, countInEveryRound: cier,
                  mode: currentMode, volume: vol } = stateRef.current;

          const beatLen           = 60 / b;
          const countInBeats      = bpb2 * cib2;
          const interCountInBeats = cier ? bpb2 * cib2 : 0;
          const { exMode: em, pickedNums: pn } = stateRef.current;
          const totalInSet        = (em === 'pick' && pn && pn.length > 0) ? pn.length : max - min + 1;

          while (nextBeatTime.current < ctx.currentTime + LOOKAHEAD_TIME) {
            const bc = beatCount.current;

            if (bc < countInBeats) {
              const beatInCI = bc % bpb2;
              scheduleWoodblock(ctx, nextBeatTime.current, beatInCI === 0, vol);
              const t = nextBeatTime.current;
              setTimeout(() => { if (stoppedRef.current) return; setCountInBeat(bc + 1); setPhase("countin"); },
                Math.max(0, (t - ctx.currentTime) * 1000));
              if (bc === countInBeats - 1) {
                const cur = lastExercise.current;
                const nxt = setEndPending.current ? -1 : nextExercise.current;
                setTimeout(() => {
                  if (stoppedRef.current) return;
                  onChange(cur);
                  onNext(nxt);
                  setPhase("playing");
                  setIsResuming(false);
                  resumingRef.current = false;
                }, Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
              }

            } else {
              const inInterCountIn = countInProgress.current;

              if (inInterCountIn) {
                const interPos = countInBeatPos.current;
                scheduleWoodblock(ctx, nextBeatTime.current, interPos % bpb2 === 0, vol);
                const t = nextBeatTime.current;
                setTimeout(() => { if (stoppedRef.current) return; setCountInBeat(interPos + 1); setPhase("countin"); },
                  Math.max(0, (t - ctx.currentTime) * 1000));
                countInBeatPos.current++;
                if (countInBeatPos.current >= interCountInBeats) {
                  countInProgress.current = false; countInBeatPos.current = 0;
                  const upcoming = nextExercise.current;
                  const t2 = nextBeatTime.current;
                  setTimeout(() => { if (stoppedRef.current) return; onNext(upcoming); setPhase("playing"); },
                    Math.max(0, (t2 - ctx.currentTime) * 1000 + beatLen * 1000));
                }

              } else {
                const playBeat      = playBeatCount.current;
                const beatInBar     = playBeat % bpb2;
                const barInExercise = Math.floor(playBeat / bpb2) % bpe;
                const isNewExercise = playBeat > 0 && beatInBar === 0 && barInExercise === 0;
                const isDownbeat    = beatInBar === 0;

                if (!(isNewExercise && setEndPending.current && !loopingRef.current)) {
                  scheduleMetronomeClick(ctx, nextBeatTime.current, isDownbeat, vol);
                }
                const t = nextBeatTime.current;
                setTimeout(() => {
                  if (stoppedRef.current) return;
                  setCurrentBeat(beatInBar);
                  setCurrentBar(barInExercise);
                  if (currentMode !== MODE_CLICKONLY && isDownbeat && barInExercise === 0 && playBeat > 0) {
                    setFlashOn(true);
                    setTimeout(() => setFlashOn(false), FLASH_DURATION_MS);
                  }
                }, Math.max(0, (t - ctx.currentTime) * 1000));

                if (currentMode === MODE_CLICKONLY) {
                  if (isDownbeat && playBeat > 0) {
                    const newBarCount = lastExercise.current + 1;
                    lastExercise.current = newBarCount;
                    setTimeout(() => { if (stoppedRef.current) return; onChange(newBarCount); }, Math.max(0, (t - ctx.currentTime) * 1000));
                  }
                  playBeatCount.current++;
                } else if (isNewExercise) {
                  if (setEndPending.current) {
                    if (loopingRef.current) {
                      const current = lastExercise.current;
                      setTimeout(() => { if (stoppedRef.current) return; onChange(current); }, Math.max(0, (t - ctx.currentTime) * 1000));
                      playBeatCount.current = 1;
                    } else {
                      clearInterval(schedulerRef.current);
                      scheduleEndBell(ctx, nextBeatTime.current, vol);
                      const t2 = t;
                      setTimeout(() => { if (stoppedRef.current) return; onDone(); }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                      setEndPending.current = false;
                    }
                  } else if (loopingRef.current) {
                    const current = lastExercise.current;
                    setTimeout(() => { if (stoppedRef.current) return; onChange(current); }, Math.max(0, (t - ctx.currentTime) * 1000));
                    playBeatCount.current = 1;
                  } else {
                    const setDone = (currentMode === MODE_FULLSET || currentMode === MODE_SEQUENTIAL)
                      && exercisesPlayed.current >= totalInSet - 1
                      && !infiniteRef.current;

                    if (setDone) {
                      const incoming = nextExercise.current;
                      lastExercise.current = incoming;
                      setEndPending.current = true;

                      if (interCountInBeats > 0) {
                        nextExercise.current = -1;
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(-1); setPhase("countin"); setCountInBeat(1); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                        countInProgress.current = true;
                        countInBeatPos.current = 1;
                        playBeatCount.current = 0;
                        scheduleWoodblock(ctx, nextBeatTime.current, true, vol);
                        if (countInBeatPos.current >= interCountInBeats) {
                          countInProgress.current = false; countInBeatPos.current = 0;
                          setTimeout(() => { if (stoppedRef.current) return; setPhase("playing"); },
                            Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
                        }
                      } else {
                        const t2 = t;
                        setTimeout(() => {
                          if (stoppedRef.current) return;
                          onChange(incoming);
                          onNext(-1);
                        }, Math.max(0, (t2 - ctx.currentTime) * 1000));
                        playBeatCount.current = 1;
                      }
                    } else {
                      exercisesPlayed.current++;
                      const incoming = nextExercise.current;
                      lastExercise.current = incoming;
                      const upcoming = pickNext(min, max, incoming, currentMode);
                      nextExercise.current = upcoming;

                      if (interCountInBeats > 0) {
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(incoming); setPhase("countin"); setCountInBeat(1); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                        countInProgress.current = true;
                        countInBeatPos.current = 1;
                        playBeatCount.current = 0;
                        scheduleWoodblock(ctx, nextBeatTime.current, true, vol);
                        if (countInBeatPos.current >= interCountInBeats) {
                          countInProgress.current = false; countInBeatPos.current = 0;
                          setTimeout(() => { if (stoppedRef.current) return; onNext(upcoming); setPhase("playing"); },
                            Math.max(0, (t - ctx.currentTime) * 1000 + beatLen * 1000));
                        }
                      } else {
                        playBeatCount.current = 1;
                        setTimeout(() => { if (stoppedRef.current) return; onChange(incoming); onNext(upcoming); },
                          Math.max(0, (t - ctx.currentTime) * 1000));
                      }
                    }
                  }
                } else {
                  playBeatCount.current++;
                }
              }
            }

            beatCount.current++;
            nextBeatTime.current += beatLen;
          }
        };

        schedulerFn.current = scheduler;
        schedulerRef.current = setInterval(scheduler, SCHEDULER_INTERVAL_MS);
        return () => clearInterval(schedulerRef.current);
      }, [running, getCtx, pickNext]);

      return { currentBeat, currentBar, phase, flashOn, countInBeat, isResuming, getCtx };
    }

    // ── Long press ─────────────────────────────────────────────────────────────

    function useLongPress(callback, { delay = 400, interval = 80 } = {}) {
      const timeoutRef   = useRef(null);
      const intervalRef  = useRef(null);

      const start = useCallback(() => {
        callback();
        timeoutRef.current = setTimeout(() => {
          intervalRef.current = setInterval(callback, interval);
        }, delay);
      }, [callback, delay, interval]);

      const stop = useCallback(() => {
        clearTimeout(timeoutRef.current);
        clearInterval(intervalRef.current);
      }, []);

      return {
        onMouseDown: start,
        onMouseUp: stop,
        onMouseLeave: stop,
        onTouchStart: (e) => { e.preventDefault(); start(); },
        onTouchEnd: (e) => { e.preventDefault(); stop(); },
        onTouchCancel: stop,
      };
    }

    // ── Swipe input ────────────────────────────────────────────────────────────

    function useSwipeInput({ onSwipeUp, onSwipeDown, onTap, disabled, threshold = 15 }) {
      const startYRef = useRef(null);
      return {
        onTouchStart: (e) => { if (disabled) return; e.preventDefault(); startYRef.current = e.touches[0].clientY; },
        onTouchEnd: (e) => {
          if (startYRef.current === null) return;
          const delta = startYRef.current - e.changedTouches[0].clientY;
          startYRef.current = null;
          if (Math.abs(delta) > threshold) { if (delta > 0) onSwipeUp(); else onSwipeDown(); } else { onTap(); }
        },
        onClick: () => { if (!disabled) onTap(); },
        style: { touchAction: 'none' },
      };
    }

    // ── Numpad components ──────────────────────────────────────────────────────

    function NumpadGrid({ onDigit, onBackspace, onClear }) {
      return (
        <div className="numpad-grid">
          {[7,8,9,4,5,6,1,2,3].map(d => (
            <button key={d} className="numpad-key" onPointerDown={(e) => { e.preventDefault(); onDigit(String(d)); }}>{d}</button>
          ))}
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onClear(); }}>✕</button>
          <button className="numpad-key" onPointerDown={(e) => { e.preventDefault(); onDigit('0'); }}>0</button>
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onBackspace(); }}>⌫</button>
        </div>
      );
    }

    function LetterpadGrid({ onLetter, onBackspace, onClear }) {
      return (
        <div className="letterpad-grid">
          {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => (
            <button key={l} className="numpad-key letter-key" onPointerDown={(e) => { e.preventDefault(); onLetter(l); }}>{l}</button>
          ))}
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onClear(); }}>✕</button>
          <button className="numpad-key fn" onPointerDown={(e) => { e.preventDefault(); onBackspace(); }}>⌫</button>
        </div>
